<div class="modal-dialog modal-lg search">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Find</h1>
      <div>
        <button type="button" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </button>
      </div>
    </div>
    <div class="modal-body">
      <div class="search-form">
        <div class="input-group">
          <label for="search-text"></label>
          <input type="text"
                 id="search-text"
                 class="search-text"
                 name="search_text"
                 hx-post="/search/results"
                 hx-trigger="keyup changed delay:500ms, search"
                 hx-target="#search-results"
                 hx-include="#search-scope"
                 autocomplete="off"
                 placeholder="Search..."
                 autofocus />
          <span class="input-group-text">
            <i class="icon-search"></i>
          </span>
        </div>
        <div class="search-tabs">
          <input type="hidden"
                 id="search-scope"
                 name="scope"
                 value="{{ active_scope|default:'all' }}" />
          <button type="button"
                  class="search-tab {% if active_scope == 'all' or not active_scope %}active{% endif %}"
                  data-scope="all"
                  onclick="switchSearchTab(this)">All</button>
          {% for key, label, model in scopes %}
            <button type="button"
                    class="search-tab {% if active_scope == key %}active{% endif %}"
                    data-scope="{{ key }}"
                    onclick="switchSearchTab(this)">{{ label }}</button>
          {% endfor %}
        </div>
      </div>
      <div id="search-results" class="search-results">
        <div class="search-results-placeholder">
          <i class="icon-search"></i>
          <p>Search across your data</p>
        </div>
      </div>
      <div class="search-hint cmd-palette-hint">
        <span><kbd>tab</kbd> nav/search</span>
        <span><kbd>h/l</kbd> tabs</span>
        <span><kbd>j/k</kbd> results</span>
        <span><kbd>enter</kbd> open</span>
        <span><kbd>esc</kbd> close</span>
      </div>
    </div>
  </div>
</div>
