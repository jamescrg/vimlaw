<div class="toolbar">
  <div class="toolbar-left">
    <h2>Groups</h2>
    <div class="filter-tools">
      <button type="button"
              hx-get="{% url 'settings:add-group' %}"
              hx-target="#htmx-modal-container"
              hx-trigger="click">
        <i class="icon-plus"></i>
      </button>
      <a class="{% if group_filter == 'active' %}toggle-active{% endif %}"
         href="#"
         hx-post="{% url 'settings:group-filter' 'active' %}">Active</a>
      <a class="{% if group_filter == 'inactive' %}toggle-active{% endif %}"
         href="#"
         hx-post="{% url 'settings:group-filter' 'inactive' %}">Inactive</a>
      <a class="{% if group_filter == 'all' %}toggle-active{% endif %}"
         href="#"
         hx-post="{% url 'settings:group-filter' 'all' %}">All</a>
    </div>
  </div>
</div>
<div class="table-container">
  <table class="table settings-table groups-table">
    <thead>
      <tr>
        <th>Name</th>
        <th class="status-col center-data">Active</th>
      </tr>
    </thead>
    <tbody id="groups-sortable">
      {% for group in groups %}
        <tr data-group-id="{{ group.id }}">
          <td class="dropdown-cell">
            <div class="name-cell-content">
              <i class="icon-grip-vertical drag-handle"></i>
              <div class="dropdown" x-data="dropdown()">
                <button class="button-link"
                        type="button"
                        x-ref="button"
                        @click="toggle()"
                        :aria-expanded="open">{{ group.name }}</button>
                <ul class="dropdown-menu" x-ref="menu" x-show="open">
                  <li>
                    <a class="dropdown-item"
                       hx-get="{% url 'settings:edit-group' group.id %}"
                       hx-target="#htmx-modal-container"
                       hx-trigger="click"><i class="icon-pencil"></i> Edit</a>
                  </li>
                  <li>
                    <a class="dropdown-item"
                       hx-post="{% url 'settings:delete-group' group.id %}"
                       hx-confirm="Are you sure? This will also delete any contact relationships using this group."><i class="icon-trash-2"></i> Delete</a>
                  </li>
                </ul>
              </div>
            </div>
          </td>
          <td class="status-col center-data">
            {% if group.is_active %}
              <i class="icon-circle-check true-bool"></i>
            {% else %}
              <i class="icon-circle-x false-bool"></i>
            {% endif %}
          </td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="2" class="empty-message">No groups found.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
