<div class="toolbar">
  <div class="toolbar-left">
    <h2>Groups</h2>
    <div class="filter-tools">
      <button type="button"
              hx-get="{% url 'settings:add-group' %}"
              hx-target="#htmx-modal-container"
              hx-trigger="click"
              data-bs-toggle="modal"
              data-bs-target="#htmx-modal-container">
        <i class="bi bi-plus-lg"></i>
      </button>
      <a class="{% if group_filter == 'active' %}toggle-active{% endif %}"
         href="#"
         hx-post="{% url 'settings:group-filter' 'active' %}">Active</a>
      <a class="{% if group_filter == 'inactive' %}toggle-active{% endif %}"
         href="#"
         hx-post="{% url 'settings:group-filter' 'inactive' %}">Inactive</a>
      <a class="{% if group_filter == 'all' %}toggle-active{% endif %}"
         href="#"
         hx-post="{% url 'settings:group-filter' 'all' %}">All</a>
    </div>
  </div>
</div>
<div class="table-container">
  <table class="table settings-table groups-table">
    <thead>
      <tr>
        <th>Name</th>
        <th class="status-col">Status</th>
      </tr>
    </thead>
    <tbody id="groups-sortable">
      {% for group in groups %}
        <tr data-group-id="{{ group.id }}">
          <td>
            <div class="name-cell-content">
              <i class="bi bi-grip-vertical drag-handle"></i>
              <button class="button-link"
                      type="button"
                      data-bs-toggle="dropdown"
                      aria-expanded="false">{{ group.name }}</button>
              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item"
                     hx-get="{% url 'settings:edit-group' group.id %}"
                     hx-target="#htmx-modal-container"
                     hx-trigger="click"
                     data-bs-toggle="modal"
                     data-bs-target="#htmx-modal-container">Edit</a>
                </li>
                <li>
                  <a class="dropdown-item"
                     hx-post="{% url 'settings:delete-group' group.id %}"
                     hx-confirm="Are you sure you want to delete this group?">Delete</a>
                </li>
              </ul>
            </div>
          </td>
          <td class="status-col">
            {% if group.is_active %}
              Active
            {% else %}
              Inactive
            {% endif %}
          </td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="2" class="empty-message">No groups found.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
