<div class="toolbar">
  <div class="toolbar-left">
    <h2>Roles</h2>
    <div class="filter-tools">
      <button type="button"
              hx-get="{% url 'settings:add-role' %}"
              hx-target="#htmx-modal-container"
              hx-trigger="click"
              data-bs-toggle="modal"
              data-bs-target="#htmx-modal-container">
        <i class="bi bi-plus-lg"></i>
      </button>
      <a class="{% if role_filter == 'active' %}toggle-active{% endif %}"
         href="#"
         hx-post="{% url 'settings:role-filter' 'active' %}">Active</a>
      <a class="{% if role_filter == 'inactive' %}toggle-active{% endif %}"
         href="#"
         hx-post="{% url 'settings:role-filter' 'inactive' %}">Inactive</a>
      <a class="{% if role_filter == 'all' %}toggle-active{% endif %}"
         href="#"
         hx-post="{% url 'settings:role-filter' 'all' %}">All</a>
    </div>
  </div>
</div>
<div class="table-container">
  <table class="table settings-table">
    <thead>
      <tr>
        <th>Name</th>
        <th class="status-col">Status</th>
      </tr>
    </thead>
    <tbody>
      {% for role in roles %}
        <tr>
          <td>
            <button class="button-link"
                    type="button"
                    data-bs-toggle="dropdown"
                    aria-expanded="false">{{ role.name }}</button>
            <ul class="dropdown-menu">
              <li>
                <a class="dropdown-item"
                   hx-get="{% url 'settings:edit-role' role.id %}"
                   hx-target="#htmx-modal-container"
                   hx-trigger="click"
                   data-bs-toggle="modal"
                   data-bs-target="#htmx-modal-container">Edit</a>
              </li>
              <li>
                <a class="dropdown-item"
                   hx-post="{% url 'settings:delete-role' role.id %}"
                   hx-confirm="Are you sure? This will also delete any contact relationships using this role.">Delete</a>
              </li>
            </ul>
          </td>
          <td class="status-col">
            {% if role.is_active %}
              Active
            {% else %}
              Inactive
            {% endif %}
          </td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="2" class="empty-message">No roles found.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
