{% extends "settings/main.html" %}
{% block subcontent %}
  <div class="section settings">
    <div class="toolbar">
      <h1>Log Out</h1>
    </div>
    <p class="section-text">Log out of all sessions on all devices.</p>
    <p class="section-text">
      Logged in as: <span class="username">{{ user.username }}</span>
    </p>
    <table class="options">
      <tr>
        <td class="setting-label">Session</td>
        <td class="setting-control">
          <a class="btn btn-primary" href="{% url 'accounts:logout' %}">Logout</a>
        </td>
      </tr>
    </table>
  </div>
{% endblock subcontent %}
