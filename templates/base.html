{% load static %}
{% load cache_buster %}
<!DOCTYPE html>
<head>
  <meta charset="UTF-8" content="" />
  <title>LawAdmin</title>
  {% if env == 'dev' %}
    <link rel="icon"
          type="image/x-icon"
          href="{% static 'images/briefcase-fill-dev.svg' %}" />
  {% else %}
    <link rel="icon"
          type="image/x-icon"
          href="{% static 'images/briefcase-fill.svg' %}" />
  {% endif %}
  <!-- set viewport for mobile devices -->
  <meta name="viewport" content="width = device-width, initial-scale = 1" />
  <!-- Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css" />
  <!-- bootstrap stylesheet -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        rel="stylesheet" />
  <!-- app stylesheets -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
  <link rel="stylesheet" href="{% static_v 'css/colors.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/typeography.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/layout.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/nav.css' %}" />

  <link rel="stylesheet" href="{% static_v 'css/forms.css' %}" />

  <link rel="stylesheet" href="{% static_v 'css/apps/agenda.css' %}" />

  <link rel="stylesheet" href="{% static_v 'css/apps/invoicing.css' %}" />

  <link rel="stylesheet" href="{% static_v 'css/apps/search.css' %}" />

  <link rel="stylesheet" href="{% static_v 'css/apps/reports.css' %}" />

  <link rel="stylesheet"
        href="{% static_v 'css/apps/matters/contacts.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/apps/matters/events.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/apps/matters/tasks.css' %}" />
  <link rel="stylesheet"
        href="{% static_v 'css/apps/matters/proceedings.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/apps/matters/rates.css' %}" />
  <link rel="stylesheet"
        href="{% static_v 'css/apps/matters/settlement.css' %}" />

        href="{% static_v 'css/apps/matters/timeline.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/apps/matters/ledger.css' %}" />
  {% if env == 'dev' %}
    <link rel="stylesheet" href="{% static_v 'css/dev.css' %}" />
  {% endif %}
</head>
<body class="{% if env == 'dev' %}env-dev{% endif %}"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
  {% if env == 'dev' %}
    <div class="dev-banner">
      <span>DEVELOPMENT ENVIRONMENT</span>
    </div>
  {% endif %}
  {% include "modals.html" %}
  {% include "nav.html" %}
  {% block content %}
  {% endblock content %}
  <!-- javascript -->
  <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.7.0"></script>
  <script src="https://unpkg.com/dropzone@5/dist/min/dropzone.min.js"></script>
  <link rel="stylesheet"
        href="https://unpkg.com/dropzone@5/dist/min/dropzone.min.css"
        type="text/css" />
  <script src="{% static_v 'js/main.js' %}"></script>
  <script src="{% static_v 'js/folders.js' %}"></script>
  <script src="{% static_v 'js/matters.js' %}" defer></script>
  <script src="{% static_v 'js/activity.js' %}" defer></script>
  <script src="{% static_v 'js/invoicing.js' %}" defer></script>
  <script src="{% static_v 'js/file-upload-forms.js' %}" defer></script>
