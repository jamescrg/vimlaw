<!DOCTYPE html>

<head>
    <meta charset="UTF-8" content="">
    <title>LawAdmin | {{ page|title }}</title>
    <link rel="icon" type="image/x-icon" href="/static/images/briefcase-fill.svg">

    <!-- set viewport for mobile devices -->
    <meta name="viewport" content="width = device-width, initial-scale = 1">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">

    <!-- bootstrap stylesheet -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- app stylesheets -->
    <link rel="stylesheet" href="/static/css/colors.css">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="stylesheet" href="/static/css/nav.css">
    <link rel="stylesheet" href="/static/css/forms.css">
    <link rel="stylesheet" href="/static/css/folders.css">
    <link rel="stylesheet" href="/static/css/pages/{{ page }}.css">

    {% if page == 'matters' %}
        <link rel="stylesheet" href="/static/css/pages/matters/activity.css">
        <link rel="stylesheet" href="/static/css/pages/matters/contacts.css">
        <link rel="stylesheet" href="/static/css/pages/matters/events.css">
        <link rel="stylesheet" href="/static/css/pages/matters/proceedings.css">
        <link rel="stylesheet" href="/static/css/pages/matters/settlement.css">
        <link rel="stylesheet" href="/static/css/pages/matters/timeline.css">
        <link rel="stylesheet" href="/static/css/pages/matters/rates.css">
    {% endif %}

</head>

<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

{% include "modals.html" %}

{% include "nav.html" %}

<div id="content" class="container content">

    {% block content %}

    {% endblock content %}

</div>


<!-- javascript -->
<script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.7.0"></script>

<script src="/static/js/main.js"></script>

{% if page == 'agenda' or 'contacts' %}
    <script src="/static/js/folders.js"></script>
{% endif %}

<script src="/static/js/events.js" defer></script>
{% if page == 'matters' %}
    <script src="/static/js/matters.js" defer></script>
    <script src="/static/js/activity.js" defer></script>
{% elif page == 'events' %}
{% elif page == 'activity' %}
    <script src="/static/js/activity.js" defer></script>
{% endif %}
