{% load static %}
<!DOCTYPE html>
<head>
  <meta charset="UTF-8" content="" />
  <title>LawAdmin</title>
  <link rel="icon"
        type="image/x-icon"
        href="{% static 'images/briefcase-fill.svg' %}" />
  <!-- set viewport for mobile devices -->
  <meta name="viewport" content="width = device-width, initial-scale = 1" />
  <!-- Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css" />
  <!-- bootstrap stylesheet -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        rel="stylesheet" />
  <!-- app stylesheets -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/colors.css' %}" />
  <link rel="stylesheet" href="{% static 'css/typeography.css' %}" />
  <link rel="stylesheet" href="{% static 'css/layout.css' %}" />
  <link rel="stylesheet" href="{% static 'css/nav.css' %}" />
  <link rel="stylesheet" href="{% static 'css/subnav.css' %}" />
  <link rel="stylesheet" href="{% static 'css/sections.css' %}" />
  <link rel="stylesheet" href="{% static 'css/tables.css' %}" />
  <link rel="stylesheet" href="{% static 'css/lists.css' %}" />
  <link rel="stylesheet" href="{% static 'css/modals.css' %}" />
  <link rel="stylesheet" href="{% static 'css/pagination.css' %}" />
  <link rel="stylesheet" href="{% static 'css/buttons.css' %}" />
  <link rel="stylesheet" href="{% static 'css/icons.css' %}" />
  <link rel="stylesheet" href="{% static 'css/forms.css' %}" />
  <link rel="stylesheet" href="{% static 'css/interface.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/agenda.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/contacts.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/folders.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/activity.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/billing.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/trust.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/intakes.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/search.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/settings.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/matters.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/matters/activity.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/matters/contacts.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/matters/events.css' %}" />
  <link rel="stylesheet"
        href="{% static 'css/apps/matters/proceedings.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/matters/rates.css' %}" />
  <link rel="stylesheet"
        href="{% static 'css/apps/matters/settlement.css' %}" />
  <link rel="stylesheet" href="{% static 'css/apps/matters/timeline.css' %}" />
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
  {% include "modals.html" %}
  {% include "nav.html" %}
  <div id="content" class="container content">
    {% block content %}
    {% endblock content %}
  </div>
  <!-- javascript -->
  <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.7.0"></script>
  <script src="/static/js/main.js"></script>
  {% if app == 'agenda' or 'contacts' %}<script src="/static/js/folders.js"></script>{% endif %}
  <script src="/static/js/events.js" defer></script>
  {% if app == 'matters' %}
    <script src="/static/js/matters.js" defer></script>
    <script src="/static/js/activity.js" defer></script>
  {% elif app == 'events' %}
  {% elif app == 'activity' %}
    <script src="/static/js/activity.js" defer></script>
  {% elif app == 'billing' %}
    <script src="/static/js/billing.js" defer></script>
  {% endif %}
  <script>
    <!--
    window.onload = () => { -->
        <!--
        const myModal = new bootstrap.Modal('#htmx-modal-container'); -->
        <!--
        myModal.show()
    } -->
    <!-- } -->
</script>
</body>
