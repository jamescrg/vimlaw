<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Add Expense Entry</h1>
      <div>
        <a href="#" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="expense-form"
            action="{% url 'activity:expenses-add' id=matter_id request_app='matters' %}"
            class="form-compact"
            method="post"
            role="form">
        {% csrf_token %}
        {{ form }}
      </form>
    </div>
    <div class="modal-footer">
      <button type="submit" form="expense-form" class="btn btn-success">Submit</button>
    </div>
  </div>
</div>
