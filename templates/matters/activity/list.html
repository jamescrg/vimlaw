{% extends "matters/detail.html" %}
{% block subcontent %}
  <div class="section-title">
    <div class="section-title-left">
      <h2>Last 30 Days</h2>
    </div>
    <a href={% url 'activity:filter-matter' id=matter.id %}>Jump to Activity: All</a>
  </div>
  <div class="matter-section-data">
    <div class="table-container">
      <table id="activity" class="table">
        {% if entries %}
          {% for entry in entries %}
            <tr>
              <td class="date">{{ entry.date|date:'Y-m-d' }}</td>
              <td>
                <a href={% url 'activity:edit' id=entry.id %}>{{ entry.actions }}</a>
              </td>
              <td class="hours">{{ entry.hours }}</td>
            </tr>
          {% endfor %}
        {% endif %}
      </table>
    </div>
  </div>
{% endblock subcontent %}
