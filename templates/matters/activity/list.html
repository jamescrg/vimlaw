{% block subcontent %}
  <div class="toolbar">
    <div class="toolbar-left">
      <h2>Time Entries</h2>
    </div>
    <a href="{% url 'activity:time-filter-matter' matter.id %}">View All Activity</a>
  </div>
  <div class="table-container">
    <table class="table matter-activity">
      {% if entries %}
        {% for entry in entries %}
          <tr>
            <td class="date">{{ entry.date|date:'Y-m-d' }}</td>
            <td>{{ entry.actions }}</td>
            <td class="hours">{{ entry.hours }}</td>
          </tr>
        {% endfor %}
      {% endif %}
    </table>
    {% include "pagination.html" %}
  </div>
{% endblock subcontent %}
