{% extends "base.html" %}
{% block content %}
  <div class="section">
    <div class="toolbar">
      <h1>
        {% if edit %}
          Edit Matter
        {% else %}
          Add Matter
        {% endif %}
      </h1>
    </div>
    <form action="{{ action }}"
          method="post"
          class="form-responsive matter-form">
      {% csrf_token %}
      {{ form }}
      <br />
      <div class="flex-center-space">
        <div>
          <button type="submit" class="submit">Submit</button>
        </div>
        <div>
          {% if edit %}
            <a onclick="return confirm('Are you sure you want to delete this record?')"
               class="delete-link"
               href="{% url 'matters:delete' id=matter.id %}">Delete Matter</a>
          {% endif %}
        </div>
      </div>
    </form>
  </div>
{% endblock content %}
