<div>
  <input autofocus
         class="edit-matter-work-status-input"
         type="text"
         name="work_status"
         hx-post="{% url 'matters:update-work-status' id=matter.id %}"
         hx-target="#matter-{{ matter.id }}"
         hx-trigger="change, blur, keyup[key=='Enter']"
         onfocus="moveFocusToEnd(this)"
         hx-swap="outerHTML"
         value="{{ matter.work_status }}" />
</div>
