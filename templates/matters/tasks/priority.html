<div class="dropdown">
  <button class="button-link"
          type="button"
          data-bs-toggle="dropdown"
          aria-expanded="false">{{ task.priority }}</button>
  <ul class="dropdown-menu">
    {% for i in "1234567890"|make_list %}
      <li>
        <a class="dropdown-item"
           href="#"
           hx-post="{% url 'matters:tasks-priority' matter.id task.id forloop.counter %}"
           hx-target="#matterTasks"
           hx-swap="outerHTML"><i class="bi bi-flag"></i> Priority {{ forloop.counter }}</a>
      </li>
    {% endfor %}
  </ul>
</div>
