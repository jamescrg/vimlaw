<div class="dropdown" x-data="dropdown()">
  <button type="button"
          class="btn-icon"
          x-ref="button"
          @click="toggle()"
          :aria-expanded="open">
    <span><i class="icon-flag with-text"></i> Importance</span>
    <small><i class="icon-chevron-down"></i></small>
  </button>
  <ul class="dropdown-menu" x-ref="menu" x-show="open" @click="close()">
    <li>
      <a class="dropdown-item"
         href="#"
         hx-post="{% url 'matters:tasks-bulk-set-importance' matter.id %}"
         hx-vals='{"importance": "7"}'
         hx-swap="none"><i class="icon-chevrons-up importance-7"></i> Highest</a>
    </li>
    <li>
      <a class="dropdown-item"
         href="#"
         hx-post="{% url 'matters:tasks-bulk-set-importance' matter.id %}"
         hx-vals='{"importance": "6"}'
         hx-swap="none"><i class="icon-chevron-up importance-6"></i> Higher</a>
    </li>
    <li>
      <a class="dropdown-item"
         href="#"
         hx-post="{% url 'matters:tasks-bulk-set-importance' matter.id %}"
         hx-vals='{"importance": "5"}'
         hx-swap="none"><i class="icon-chevron-up importance-5"></i> High</a>
    </li>
    <li>
      <a class="dropdown-item"
         href="#"
         hx-post="{% url 'matters:tasks-bulk-set-importance' matter.id %}"
         hx-vals='{"importance": "4"}'
         hx-swap="none"><i class="icon-equal"></i> Normal</a>
    </li>
    <li>
      <a class="dropdown-item"
         href="#"
         hx-post="{% url 'matters:tasks-bulk-set-importance' matter.id %}"
         hx-vals='{"importance": "3"}'
         hx-swap="none"><i class="icon-chevron-down importance-3"></i> Low</a>
    </li>
    <li>
      <a class="dropdown-item"
         href="#"
         hx-post="{% url 'matters:tasks-bulk-set-importance' matter.id %}"
         hx-vals='{"importance": "2"}'
         hx-swap="none"><i class="icon-chevron-down importance-2"></i> Lower</a>
    </li>
    <li>
      <a class="dropdown-item"
         href="#"
         hx-post="{% url 'matters:tasks-bulk-set-importance' matter.id %}"
         hx-vals='{"importance": "1"}'
         hx-swap="none"><i class="icon-chevrons-down importance-1"></i> Lowest</a>
    </li>
  </ul>
</div>
<button type="button"
        class="btn-icon"
        x-data
        @click.prevent=" const input = document.createElement('input'); input.style.cssText = 'position:absolute;visibility:hidden;height:0;width:0;padding:0;'; $el.parentElement.appendChild(input); flatpickr(input, { dateFormat: 'Y-m-d', allowInput: true, positionElement: $el, onReady: (_, __, fp) => { const btn = document.createElement('button'); btn.textContent = 'Clear'; btn.className = 'flatpickr-clear'; btn.type = 'button'; btn.addEventListener('click', () => { htmx.ajax('POST', '{% url 'matters:tasks-bulk-clear-due-date' matter.id %}', { swap: 'none' }); fp.close(); }); fp.calendarContainer.appendChild(btn); fp.open(); }, onChange: (_, dateStr) => { htmx.ajax('POST', '{% url 'matters:tasks-bulk-set-due-date' matter.id %}', { swap: 'none', values: { date_due: dateStr } }); }, onClose: () => { input.remove(); } }); ">
  <i class="icon-calendar with-text"></i> Date
</button>
