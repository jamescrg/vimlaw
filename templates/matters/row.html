{% load humanize %}
<tr id="matter-{{ matter.id }}">
  <td class="name">
    <a href={% url 'matters:contacts' id=matter.id %}>{{ matter.name }}</a>
  </td>
  <td id="show-matter-work-status-{{ matter.id }}">
    <a class="button-link show-status-form-button"
       href="#"
       hx-target="#show-matter-work-status-{{ matter.id }}"
       hx-swap="innerHTML"
       hx-get="{% url 'matters:edit-work-status' matter_id=matter.id %}">{{ matter.work_status }}</a>
  </td>
  <td class="case-no">
    {% if matter.primary_proceeding.case_number %}
      <div class="case-no-content">
        <a href="{% url 'matters:proceedings-index' id=matter.id %}">{{ matter.primary_proceeding.case_number }}</a>
        <button type="button"
                class="btn btn-sm copy-btn"
                data-copy="{{ matter.primary_proceeding.case_number }}"
                title="Copy case number">
          <i class="bi bi-clipboard"></i>
        </button>
      </div>
    {% endif %}
  </td>
</tr>
