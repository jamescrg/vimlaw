{% load humanize %}
<tr id="matter-{{ matter.id }}">
  <td class="name">
    <a href={% url 'matters:contacts' id=matter.id %}>{{ matter.name }}</a>
  </td>
  <td id="show-matter-work-status-{{ matter.id }}">
    <a class="button-link show-status-form-button"
       href="#"
       hx-target="#show-matter-work-status-{{ matter.id }}"
       hx-swap="innerHTML"
       hx-get="{% url 'matters:edit-work-status' matter_id=matter.id %}">{{ matter.work_status }}</a>
  </td>
  <td class="case-no dropdown-cell">
    {% if matter.primary_proceeding.case_number %}
      <div class="case-no-content">
        <span>{{ matter.primary_proceeding.case_number }}</span>
        <div class="dropdown" x-data="dropdown()">
          <button class="btn-icon menu-icon"
                  type="button"
                  x-ref="button"
                  @click="toggle()"
                  :aria-expanded="open">
            <i class="icon-ellipsis-vertical"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end" x-ref="menu" x-show="open">
            <li>
              <a class="dropdown-item action-btn copy-btn"
                 href="#"
                 data-copy="{{ matter.primary_proceeding.case_number }}"><i class="icon-copy"></i> Copy Case Number</a>
            </li>
            <li>
              <a class="dropdown-item"
                 href="{% url 'matters:proceedings-index' id=matter.id %}"><i class="icon-eye"></i> View Proceedings</a>
            </li>
          </ul>
        </div>
      </div>
    {% endif %}
  </td>
</tr>
