{% load humanize %}
<tr id="matter-{{ matter.id }}">
  <td class="name">
    <a href={% url 'matters:detail' id=matter.id %}>{{ matter.name }}</a>
  </td>
  <td id="show-matter-description-{{ matter.id }}">
    <a class="button-link show-status-form-button"
       href="#"
       hx-target="#show-matter-description-{{ matter.id }}"
       hx-swap="innerHTML"
       hx-get="{% url 'matters:edit-description' matter_id=matter.id %}">{{ matter.description }}</a>
  </td>
  <td class="id">{{ matter.id }}</td>
</tr>
