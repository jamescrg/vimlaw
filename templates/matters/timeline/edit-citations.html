<div>
  <input autofocus
         class="edit-fact-citations-input"
         type="text"
         name="citations"
         hx-post="{% url 'matters:timeline-update-citations' matter_id=matter.id fact_id=fact.id %}"
         hx-target="#fact-{{ fact.id }}"
         hx-trigger="change, blur, keyup[key=='Enter']"
         onfocus="moveFocusToEnd(this)"
         hx-swap="outerHTML"
         value="{{ fact.citations|default_if_none:'' }}" />
</div>
