

{% extends "matters/detail.html" %}

{% block "subcontent" %}

<div class="section-title">
  <div class="section-title-left">
    <h2>Timeline</h2>
    <div class="section-title-left-right">
      <button
        hx-get="/matters/{{ matter.id }}/timeline/add"
        hx-target="#htmx-modal-container"
        data-bs-toggle="modal"
        data-bs-target="#htmx-modal-container"
      >
        <i class="bi bi-plus-lg"></i>
      </button>
    </div>
  </div>
</div>

<div class="matter-section-data">
<div style="overflow-x:auto">
<table id="facts" class="table">

		{% if facts %}
      <tr>

        <th>
          Date

        <th>
          Description

        <th>
          Citation

    {% for fact in facts %}
      <tr>

        <td class="date {% if fact.emphasis == 'Yes' %}strong{% endif %}">
          {{ fact.date|date:'Y-m-d' }}

        <td class="description {% if fact.emphasis == 'Yes' %}strong{% endif %}">
          <a
            href="#"
            type="button"
            class="btn-icon"
            hx-get="/matters/{{ matter.id }}/timeline/{{ fact.id }}/edit"
            hx-target="#htmx-modal-container"
            hx-trigger="click"
            data-bs-toggle="modal"
            data-bs-target="#htmx-modal-container"
          >
            {{ fact.description }}
          </a>

        <td class="citation {% if fact.emphasis == 'Yes' %}strong{% endif %}">
          {{ fact.citation|slice:":25"|default_if_none:'' }}

    {% endfor %}
    {% endif %}

</table>


</div>
</div>

{% endblock "subcontent" %}
