{% block subcontent %}
  <div class="toolbar">
    <div class="toolbar-left">
      <h2>Timeline</h2>
      <div class="filter-tools">
        <button hx-get="/matters/{{ matter.id }}/timeline/add"
                hx-target="#htmx-modal-container"
                data-bs-toggle="modal"
                data-bs-target="#htmx-modal-container">
          <i class="bi bi-plus-lg"></i>
        </button>
      </div>
    </div>
    <div class="toolbar-right">
      {% if facts %}
        <a href="{% url 'matters:timeline-pdf' matter.id %}"
           target="_blank"
           type="button"
           class="btn-icon">Download PDF</a>
      {% endif %}
    </div>
  </div>
  <div class="table-container">
    <table id="timeline-list" class="table timeline-list">
      {% if facts %}
        <tr>
          <th class="date-time">Date</th>
          <th class="description">Description</th>
          <th class="citations">Citations</th>
        </tr>
        {% for fact in facts %}
          {% include "matters/timeline/fact-row.html" %}
        {% endfor %}
      {% endif %}
    </table>
  </div>
{% endblock subcontent %}
