<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">
        {% if edit %}
          Edit Fact
        {% else %}
          Add Fact
        {% endif %}
      </h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form hx-post="{{ action }}"
            hx-target="#htmx-modal-container"
            class="form-compact col2">
        {% csrf_token %}
        {{ form }}
        <div class="flex-center-space span2">
          <div>
            <button type="submit" class="submit">Submit</button>
          </div>
          <div>
            {% if edit %}
              <a hx-confirm='Are you sure you want to delete this record?'
                 href="#"
                 hx-delete="{% url 'matters:timeline-delete' matter_id=matter.id fact_id=fact.id %}"
                 class="delete-link">Delete Fact</a>
            {% endif %}
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
