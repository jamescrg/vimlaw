{% extends "base.html" %}
{% block content %}
  <div class="section">
    <div class="section-title">
      <div class="section-title-left">
        <h1>{{ filter.status }} Matters ({{ number_matters }})</h1>
        <div class="section-title-left-right">
          <a href={% url 'matters:filter-quick' 'open' %}>Open</a>
        </div>
      </div>
      <div class="section-title-right">
        <button hx-get="/matters/filter"
                hx-target="#htmx-modal-container"
                data-bs-toggle="modal"
                data-bs-target="#htmx-modal-container">
          <i class="bi bi-funnel"></i>
        </button>
        <a href={% url 'matters:add' %}>
          <i class="bi bi-plus-lg"></i>
        </a>
      </div>
    </div>
    <div class="table-container">
      <table id="matter-list" class="table">
        <tr>
          <th class="matter-name">
            <a href={% url 'matters:sort-by' 'name' %}>
              Matter
              <i class="bi bi-chevron-expand"></i>
            </a>
          </th>
          <th>
            <a href={% url 'matters:sort-by' 'description' %}>
              Description / Status
              <i class="bi bi-chevron-expand"></i>
            </a>
          </th>
          <th>Matter ID</th>
        </tr>
        {% if matters %}
          {% for matter in matters %}
            <tr>
              <td class="matter-name">
                <a href={% url 'matters:detail' id=matter.id %}>{{ matter.name }}</a>
              </td>
              <td>
                <!-- -------------------------------------------------------- -->
                <!-- normal display, show matter link -->
                <!-- -------------------------------------------------------- -->
                <button class="button-link show-status-form-button"
                        onclick="showStatusForm()">{{ matter.description }}</button>
                <!-- -------------------------------------------------------- -->
                <!-- edit status form -->
                <!-- -------------------------------------------------------- -->
                <form class="edit-status"
                      method="post"
                      action="{% url 'matters:edit-description' id=matter.id %}">
                  {% csrf_token %}
                  <label>
                    <input type="text"
                           class="edit-status-input"
                           name="description"
                           onchange="submit()"
                           onblur="hideStatusForm()"
                           value="{{ matter.description }}"
                           required />
                  </label>
                </form>
              </td>
              <td class="ref-no">{{ matter.id }}</td>
            </tr>
          {% endfor %}
        {% endif %}
      </table>
    </div>
  </div>
{% endblock content %}
