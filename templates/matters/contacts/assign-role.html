{% extends "matters/detail.html" %}
{% block subcontent %}
  <div class="toolbar">
    <div class="toolbar-left">
      <h1>
        {% if edit %}
          Edit Contact Assignment
        {% else %}
          Assign Contact
        {% endif %}
      </h1>
    </div>
    {% if edit %}
      <div class="subsection-add">
        <a class="confirm"
           href="{% url 'matters:contacts-assign-delete' relationship.id %}"
           data-confirm-title="Remove Assignment"
           data-confirm-message="Are you sure you want to remove this contact assignment?"
           data-confirm-text="Remove">Remove Assignment</a>
      </div>
    {% endif %}
  </div>
  <form class="assign-role" action="{{ action }}" method="post" role="form">
    {% csrf_token %}
    <input type="hidden" name="contact_id" value="{{ contact.id }}" />
    <input type="hidden" name="matter_id" value="{{ matter.id }}" />
    <table>
      <tr>
        <td>
          <strong>Contact:</strong>
        </td>
        <td>{{ contact.name }}</td>
      </tr>
      <tr>
        <td>
          <label for="group_id">Group:</label>
        </td>
        <td>
          <select name="group_id" id="group_id" required>
            <option value="">Select a group...</option>
            {% for group in groups %}
              <option value="{{ group.id }}"
                      {% if relationship and relationship.group_id == group.id %}selected{% endif %}>
                {{ group.name }}
              </option>
            {% endfor %}
          </select>
        </td>
      </tr>
      <tr>
        <td>
          <label for="role_id">Role:</label>
        </td>
        <td>
          <select name="role_id" id="role_id" required>
            <option value="">Select a role...</option>
            {% for role in roles %}
              <option value="{{ role.id }}"
                      {% if relationship and relationship.role_id == role.id %}selected{% endif %}>
                {{ role.name }}
              </option>
            {% endfor %}
          </select>
        </td>
      </tr>
      <tr>
        <td></td>
        <td>
          <button type="submit" class="submit">
            {% if edit %}
              Update
            {% else %}
              Assign
            {% endif %}
          </button>
        </td>
      </tr>
    </table>
  </form>
{% endblock subcontent %}
