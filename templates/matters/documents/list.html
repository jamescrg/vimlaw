{% block subcontent %}
  <div class="toolbar">
    <div class="toolbar-left">
      <h2>Documents</h2>
    </div>
    <div class="toolbar-right">
      <!-- <button hx-get="/events/add/{{ matter.id }}/matters" -->
      <!--         hx-target="#htmx-modal-container" -->
      <!--         data-bs-toggle="modal" -->
      <!--         data-bs-target="#htmx-modal-container"> -->
      <!--   <i class="bi bi-plus-lg"></i> -->
      <!-- </button> -->
    </div>
  </div>
  <div class="table-container">
    <table id="documents-list" class="table">
      <tr>
        <th>
          Name
          <a href="#"
             hx-get="{% url 'matters:documents-sort' id=matter.id order='name' %}">
            <i class="bi bi-chevron-expand"></i>
          </a>
        </th>
        <th>Description</th>
        <th>Date</th>
        <th>
          Uploaded by
          <a href="#"
             hx-get="{% url 'matters:documents-sort' id=matter.id order='uploaded_by' %}">
            <i class="bi bi-chevron-expand"></i>
          </a>
        </th>
        <td class="download">
          <i class="bi bi-download"></i>
        </td>
      </tr>
      {% if documents %}
        {% for document in documents %}
          {% include "documents/row.html" %}
        {% endfor %}
      {% endif %}
    </table>
  </div>
{% endblock subcontent %}
