<div class="modal-dialog">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">
        {% if edit %}
          Edit Rate
        {% else %}
          Add Rate
        {% endif %}
      </h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="rate"
            hx-post="{{ action }}"
            hx-target="#htmx-modal-container"
            class="form-responsive">
        {% csrf_token %}
        {{ form }}
        <br />
        <div class="flex-center-space">
          <div>
            <button type="submit" class="submit">Submit</button>
          </div>
          <div>
            {% if edit %}
              <a hx-confirm='Are you sure you want to delete this record?'
                 href="#"
                 hx-delete="{% url 'matters:rates-delete' matter_id=matter.id rate_id=rate.id %}"
                 class="delete-link">Delete Rate</a>
            {% endif %}
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
