{% load static cache_buster %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Kosmos" />
    <meta name="keywords" content="Kosmos" />
    <title>Kosmos</title>
    <link rel="icon"
          type="image/svg+xml"
          href="{% static 'images/kosmos-mark.svg' %}" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-reboot.min.css">
    <link rel="stylesheet" href="{% static_v 'css/palette.css' %}" />
    <link rel="stylesheet" href="{% static_v 'css/colors.css' %}" />
    <link rel="stylesheet" href="{% static_v 'css/typeography.css' %}" />
    <link rel="stylesheet" href="{% static_v 'css/layout.css' %}" />
    <link rel="stylesheet" href="{% static_v 'css/apps/accounts.css' %}" />
    <script>
      /* Apply the user's theme before paint (mirrors base.html). */
      (function () {
        var setting = localStorage.getItem('theme') || 'auto';
        var dark = setting === 'dark' || (setting === 'auto' &&
          window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      })();
    </script>
  </head>
  <body>
    <div class="container vertical-center">
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-title">Kosmos</div>
          <div class="auth-info">
            {% block message %}
            {% endblock message %}
          </div>
          <div class="auth-buttons justify-between">
            {# djlint:off #}<a href="#" onclick="history.back();return false">Go back</a>{# djlint:on #}
            <a href="{% url 'tasks-index' %}">Return to home</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
