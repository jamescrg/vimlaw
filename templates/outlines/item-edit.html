<textarea class="item-input"
          name="content"
          autofocus
          hx-post="{% url 'outlines:item-edit' item.id %}"
          hx-target="closest .item-content-wrapper"
          hx-trigger="blur"
          hx-swap="innerHTML"
          data-item-id="{{ item.id }}"
          onkeydown="handleItemKeydown(event, this)"
          oninput="if(typeof autoResizeTextarea==='function')autoResizeTextarea(this)">{{ item.content }}</textarea>
