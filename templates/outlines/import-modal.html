<div class="modal-dialog">
  <div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title">Import from Markdown</h5>
      <button type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"></button>
    </div>
    <form hx-post="{% url 'outlines:import' outline.id %}"
          hx-target="#htmx-modal-container">
      <div class="modal-body">
        <p class="text-muted">Paste a markdown list using - or * bullets. Indentation creates nested items.</p>
        <textarea name="markdown"
                  class="form-control"
                  rows="12"
                  placeholder="- Item 1 - Nested item - Another nested - Item 2"
                  autofocus></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Import</button>
      </div>
    </form>
  </div>
</div>
