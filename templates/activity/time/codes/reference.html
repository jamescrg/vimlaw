<div class="codes-reference-table-container">
  <table class="table codes-reference-table">
    <thead>
      <tr>
        <th>Code</th>
        <th>Expansion</th>
      </tr>
    </thead>
    <tbody>
      {% for code in codes %}
        <tr>
          <td>{{ code.code }}</td>
          <td>{{ code.expansion }}</td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="2" class="empty-message">No codes available.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
