<!-- -------------------------------------------------------- -->
<!-- Javascript Rate Picker -->
<!-- -------------------------------------------------------- -->
<script type="text/javascript">

    let rates = [];

    // pulls a specific matter, if user has selected one
    // otherwise, pulls a list of all open matters

    // for each matter, creates javascript array value
    // key  = matterId, value = hourlyRate
    {% for matter, rate in matter_rates.items %}
        rates[{{ matter }}] = {{ rate }}
    {% endfor %}

</script>
<div class="modal-dialog modal-lg">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">
        {% if edit %}
          Edit Time Entry
        {% else %}
          Add Time Entry
        {% endif %}
      </h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form action="{{ action }}"
            class="form-responsive time-form"
            method="post"
            role="form">
        {% csrf_token %}
        {{ form }}
        <br />
        <div class="flex-center-space">
          <div>
            <button type="submit" class="submit">Submit</button>
          </div>
          <div>
            {% if edit %}
              <a class="confirm"
                 onclick="return confirm('Are you sure you want to delete this record?')"
                 href="{% url 'activity:time-delete' id=entry.id %}">Delete Entry</a>
            {% endif %}
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
