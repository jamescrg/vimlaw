<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">
        {% if edit %}
          Edit Time Entry
        {% else %}
          Add Time Entry
        {% endif %}
      </h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form hx-post="{{ action }}"
            hx-target="#htmx-modal-container"
            class="form-compact col2 time-form">
        {% csrf_token %}
        {{ form }}
        <br />
        <div class="flex-center-space span2">
          <div>
            <button type="submit" class="submit">Submit</button>
          </div>
          <div>
            {% if edit %}
              <a class="delete-link"
                 href="#!"
                 hx-confirm="Are you sure  you want to delete this record?"
                 hx-delete="{% url 'activity:time-delete' id=entry.id %}"
                 hx-target="#htmx-modal-container">Delete Entry</a>
            {% endif %}
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
