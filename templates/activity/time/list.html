{% block subcontent %}
  {% load humanize %}
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="filter-tools">
        <button hx-get="{% url 'activity:time-add' %}"
                hx-target="#htmx-modal-container"
                data-bs-toggle="modal"
                data-bs-target="#htmx-modal-container">
          <i class="bi bi-plus-lg"></i>
        </button>
        <button hx-get="{% url 'activity:time-filter' %}"
                hx-target="#htmx-modal-container"
                class="{% if filter_label == "custom" %}toggle-active{% endif %}"
                data-bs-toggle="modal"
                data-bs-target="#htmx-modal-container">
          <i class="bi bi-filter"></i> &nbsp;Filter
        </button>
        <button class="{% if filter_label == "unbilled" %}toggle-active{% endif %}"
                hx-post="{% url 'activity:time-filter-quick' 'unbilled' %}">Unbilled</button>
        <button class="{% if filter_label == "today" %}toggle-active{% endif %}"
                hx-post="{% url 'activity:time-filter-quick' 'today' %}">Today</button>
        <select hx-post="{% url 'activity:time-filter-user' %}"
                class="select-user"
                name="user">
          <option value="">All</option>
          {% for user in users %}
            <option value="{{ user.id }}" {% if user.id == user_id %}selected{% endif %}>{{ user.username|title }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="toolbar-right">
      <div class="dropdown">
        <button class="btn-icon"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false">
          <i class="bi bi-cloud-download"></i>
        </button>
        <ul class="dropdown-menu">
          <li>
            <a class="dropdown-item"
               href="{% url 'activity:time-export' 'standard' %}"
               onclick="javascript: return confirm('Are you sure you want to download records?')">Standard</a>
          </li>
          <li>
            <a class="dropdown-item"
               href="{% url 'activity:time-export' 'clio' %}"
               onclick="javascript: return confirm('Are you sure you want to download records?')">Clio</a>
          </li>
        </ul>
      </div>
    </div>
  </div>
  <div class="table-container">
    <table class="table activity">
      <tr>
        <th class="date">
          Date
          <a href="#" hx-post={% url 'activity:time-order-by' 'date' %}>
            <i class="bi bi-chevron-expand"></i>
          </a>
        </th>
        <th class="user">User</th>
        <th class="matter">
          Matter
          <a href="#" hx-post={% url 'activity:time-order-by' 'matter' %}>
            <i class="bi bi-chevron-expand"></i>
          </a>
        </th>
        <th class="actions">
          Actions
          <a href="#" hx-post={% url 'activity:time-order-by' 'actions' %}>
            <i class="bi bi-chevron-expand"></i>
          </a>
        </th>
        <th class="numeric hours">Hours</th>
        <th class="numeric rate">Rate</th>
        <th class="numeric fee">Fee</th>
      </tr>
      <tr id="time-table"></tr>
      {% for entry in objects %}
        <tr id="time-{{ entry.id }}">{% include "activity/time/table-row.html" %}</tr>
      {% endfor %}
    </table>
  </div>
  <div class="flex-start-space">
    <div>{% include "pagination.html" %}</div>
    {% include "activity/time/summary.html" %}
  </div>
{% endblock subcontent %}
