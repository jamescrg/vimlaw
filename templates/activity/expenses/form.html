<div class="modal-dialog modal-lg">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">
        {% if edit %}
          Edit Expense Entry
        {% else %}
          Add Expense Entry
        {% endif %}
      </h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form hx-post="{{ action }}"
            hx-target="{% if edit %}#expense-{{ entry.id }}{% else %}#expense-table{% endif %}"
            hx-swap="innerHTML"
            class="form-responsive expenses-form">
        {% csrf_token %}
        {{ form }}
        <br />
        <div class="flex-center-space">
          <div>
            <button type="submit" class="submit">Submit</button>
          </div>
          <div>
            {% if edit %}
              <a onclick="return confirm('Are you sure you want to delete this record?')"
                 hx-post="{% url 'activity:expenses-delete' id=entry.id %}"
                 hx-target="#expense-{{ entry.id }}"
                 hx-swap="outerHTML">Delete Entry</a>
            {% endif %}
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
