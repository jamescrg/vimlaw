{% load humanize %}
<div class="totals-table">
  <table>
    <tr>
      <th>Total Expenses</th>
      <td class="numeric">${{ summary.total_expenses|floatformat:2|intcomma }}</td>
    </tr>
    <tr>
      <th>Comp Expenses</th>
      <td class="numeric">${{ summary.comp_expenses|floatformat:2|intcomma }}</td>
    </tr>
    <tr>
      <th>Net Expenses</th>
      <td class="numeric">${{ summary.net_expenses|floatformat:2|intcomma }}</td>
    </tr>
  </table>
</div>
