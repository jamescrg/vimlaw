<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Filter Expenses</h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form class="form-responsive form-spacious filter"
            hx-target="#htmx-modal-container"
            hx-post="{% url 'activity:expenses-filter' %}">
        {% csrf_token %}
        {{ filter.form }}
        <br />
        <div class="flex-center-space limited-width">
          <button type="submit" class="submit">Apply</button>
          <a class="btn-icon"
             href="#"
             hx-post="{% url 'management:clear-filters' session_key='expenses_filter' trigger='expensesChanged' %}">Restore Defaults</a>
        </div>
      </form>
    </div>
  </div>
</div>
