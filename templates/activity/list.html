{% extends "base.html" %}
{# djlint:off #}{% block body_class %}has-subnav{% endblock body_class %}{# djlint:on #}
{% block content %}
  <div id="content" class="container content">
    <div class="section">
      <nav class="section-nav">
        <ul>
          <li {% if subapp == "time" %}class="active"{% endif %}>
            <a href="{% url 'activity:time-index' %}">Time</a>
          </li>
          <li {% if subapp == "expenses" %}class="active"{% endif %}>
            <a href="{% url 'activity:expenses-index' %}">Expenses</a>
          </li>
        </ul>
      </nav>
      <div class="section-body">
        {% block subcontent %}
        {% endblock subcontent %}
      </div>
    </div>
  </div>
{% endblock content %}
