<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Filter Reports</h1>
      <div>
        <a href="#" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="reports-filter-form"
            class="form-responsive form-spacious filter"
            hx-target="#htmx-modal-container"
            hx-post="{% url 'reports:filter' %}">
        {% csrf_token %}
        <label for="date_from">From Date:</label>
        <div>
          <input type="date"
                 id="date_from"
                 name="date_from"
                 value="{{ filter_data.date_from }}">
        </div>
        <label for="date_to">To Date:</label>
        <div>
          <input type="date"
                 id="date_to"
                 name="date_to"
                 value="{{ filter_data.date_to }}">
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button"
              class="btn-icon"
              hx-post="{% url 'management:clear-filters' session_key='reports_filter' trigger='reportsChanged' %}">
        Restore Defaults
      </button>
      <button type="submit" form="reports-filter-form" class="btn btn-success">Apply</button>
    </div>
  </div>
</div>
