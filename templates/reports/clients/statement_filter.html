<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Filter Client Activity</h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="client-statement-filter-form"
            class="form-responsive form-spacious filter"
            hx-target="#htmx-modal-container"
            hx-post="{% url 'reports:client-statement-filter' %}">
        {% csrf_token %}
        <label for="client">Client:</label>
        <div>
          <select id="client" name="client" required>
            <option value="">Select Client</option>
            {% for client in clients %}
              <option value="{{ client.id }}"
                      {% if filter_data.client|stringformat:"s" == client.id|stringformat:"s" %}selected{% endif %}>
                {{ client.name }}
              </option>
            {% endfor %}
          </select>
        </div>
        <label for="month_select">Month:</label>
        <div>
          <select id="month_select" name="month_num">
            <option value="">Select Month</option>
            <option value="1" {% if filter_data.month_num == "1" %}selected{% endif %}>January</option>
            <option value="2" {% if filter_data.month_num == "2" %}selected{% endif %}>February</option>
            <option value="3" {% if filter_data.month_num == "3" %}selected{% endif %}>March</option>
            <option value="4" {% if filter_data.month_num == "4" %}selected{% endif %}>April</option>
            <option value="5" {% if filter_data.month_num == "5" %}selected{% endif %}>May</option>
            <option value="6" {% if filter_data.month_num == "6" %}selected{% endif %}>June</option>
            <option value="7" {% if filter_data.month_num == "7" %}selected{% endif %}>July</option>
            <option value="8" {% if filter_data.month_num == "8" %}selected{% endif %}>August</option>
            <option value="9" {% if filter_data.month_num == "9" %}selected{% endif %}>September</option>
            <option value="10" {% if filter_data.month_num == "10" %}selected{% endif %}>October</option>
            <option value="11" {% if filter_data.month_num == "11" %}selected{% endif %}>November</option>
            <option value="12" {% if filter_data.month_num == "12" %}selected{% endif %}>December</option>
          </select>
        </div>
        <label for="year_select">Year:</label>
        <div>
          <select id="year_select" name="year">
            <option value="">Select Year</option>
            {% for year in years %}
              <option value="{{ year }}"
                      {% if filter_data.year|stringformat:"s" == year|stringformat:"s" %}selected{% endif %}>
                {{ year }}
              </option>
            {% endfor %}
          </select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="submit" form="client-statement-filter-form" class="submit">Apply</button>
      <a class="btn-icon"
         href="#"
         hx-post="{% url 'management:clear-filters' session_key='client_statement_filter' trigger='clientStatementChanged' %}">Restore Defaults</a>
    </div>
  </div>
</div>
