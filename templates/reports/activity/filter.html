<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Filter Activity</h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="activity-report-filter-form"
            class="form-responsive form-spacious filter"
            hx-target="#htmx-modal-container"
            hx-post="{% url 'reports:activity-filter' %}">
        {% csrf_token %}
        <label for="date_from">From Date:</label>
        <div>
          <input type="date"
                 id="date_from"
                 name="date_from"
                 value="{{ filter_data.date_from }}">
        </div>
        <label for="date_to">To Date:</label>
        <div>
          <input type="date"
                 id="date_to"
                 name="date_to"
                 value="{{ filter_data.date_to }}">
        </div>
        <label>
          <input type="checkbox"
                 id="exclude_inactive"
                 name="exclude_inactive"
                 {% if filter_data.exclude_inactive == "on" or not filter_data.exclude_inactive %}checked{% endif %}>
          Exclude inactive users
        </label>
      </form>
    </div>
    <div class="modal-footer">
      <button type="submit" form="activity-report-filter-form" class="submit">Apply</button>
      <a class="btn-icon"
         href="#"
         hx-post="{% url 'management:clear-filters' session_key='activity_filter' trigger='activityChanged' %}">Restore Defaults</a>
    </div>
  </div>
</div>
