<div class="dropdown" x-data="dropdown()">
  <button class="button-link"
          type="button"
          x-ref="button"
          @click="toggle()"
          :aria-expanded="open">{{ witness.importance }}</button>
  <ul class="dropdown-menu" x-ref="menu" x-show="open">
    {% for i in "1234567890"|make_list %}
      <li>
        <a class="dropdown-item"
           href="#"
           hx-get="{% url 'case:witness-importance' witness.id forloop.counter %}"
           hx-target="#witnesses"><i class="icon-flag"></i> {{ forloop.counter }}</a>
      </li>
    {% endfor %}
  </ul>
</div>
