<div class="dropdown" x-data="dropdown()">
  <button class="button-link"
          type="button"
          x-ref="button"
          @click="toggle()"
          :aria-expanded="open">{{ document.get_category_display|default:"-" }}</button>
  <ul class="dropdown-menu" x-ref="menu" x-show="open">
    <li>
      <a class="dropdown-item {% if document.category == 'Correspondence' %}active{% endif %}"
         href="#"
         hx-get="{% url 'case:document-category' document.id 'Correspondence' %}"
         hx-target="#documents">Correspondence</a>
    </li>
    <li>
      <a class="dropdown-item {% if document.category == 'Discovery' %}active{% endif %}"
         href="#"
         hx-get="{% url 'case:document-category' document.id 'Discovery' %}"
         hx-target="#documents">Discovery</a>
    </li>
    <li>
      <a class="dropdown-item {% if document.category == 'Evidence' %}active{% endif %}"
         href="#"
         hx-get="{% url 'case:document-category' document.id 'Evidence' %}"
         hx-target="#documents">Evidence</a>
    </li>
    <li>
      <a class="dropdown-item {% if document.category == 'Record' %}active{% endif %}"
         href="#"
         hx-get="{% url 'case:document-category' document.id 'Record' %}"
         hx-target="#documents">Record</a>
    </li>
  </ul>
</div>
