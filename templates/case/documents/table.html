<div class="table-container">
  <table id="documents-list" class="table table-fixed">
    <colgroup>
      <col class="col-select">
      <col class="col-category">
      <col class="col-date">
      <col class="col-document">
      <col class="col-proceeding">
      <col class="col-pages">
      <col class="col-ai">
      <col class="col-importance">
    </colgroup>
    <tr>
      <th class="col-select">
        <button class="btn-check"
                hx-post="{% url 'case:documents-select-all' matter.id %}"
                hx-swap="none"
                title="Select all">
          <i class="icon-square{% if all_selected %}-check{% endif %}"></i>
        </button>
      </th>
      <th class="col-category">Category</th>
      <th class="col-date">
        Date
        <button class="btn-sort {% if 'date' in current_order %}active{% endif %}"
                hx-get="{% url 'case:documents-sort' matter.id 'date' %}"
                hx-target="#documents">
          <i class="icon-chevrons-up-down"></i>
        </button>
      </th>
      <th class="col-document">
        Name
        <button class="btn-sort {% if 'name' in current_order %}active{% endif %}"
                hx-get="{% url 'case:documents-sort' matter.id 'name' %}"
                hx-target="#documents">
          <i class="icon-chevrons-up-down"></i>
        </button>
      </th>
      <th class="col-proceeding">Proceeding</th>
      <th class="col-pages">Pages</th>
      <th class="col-ai">AI</th>
      <th class="col-importance">
        <button class="btn-sort {% if 'importance' in current_order %}active{% endif %}"
                hx-get="{% url 'case:documents-sort' matter.id 'importance' %}"
                hx-target="#documents"
                title="Sort by importance">
          <i class="icon-flag"></i>
        </button>
      </th>
    </tr>
    {% for document in objects %}
      {% include "case/documents/row.html" %}
    {% empty %}
      <tr>
        <td colspan="8" class="empty-message">No documents found.</td>
      </tr>
    {% endfor %}
  </table>
</div>
<div class="flex-start-space">
  <div>{% include "pagination.html" %}</div>
</div>
