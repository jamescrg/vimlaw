<div class="table-container">
  <table id="facts-list" class="table facts-list">
    <tr>
      <th class="date-time">
        Date and Time
        <button class="btn-sort {% if 'date' in current_order %}active{% endif %}"
                hx-get="{% url 'case:facts-sort' matter.id 'date' %}"
                hx-target="#facts">
          <i class="bi bi-chevron-expand"></i>
        </button>
      </th>
      <th class="description">Description</th>
      <th class="importance">
        <button class="btn-sort {% if 'importance' in current_order %}active{% endif %}"
                hx-get="{% url 'case:facts-sort' matter.id 'importance' %}"
                hx-target="#facts"
                title="Sort by importance">
          <i class="bi bi-flag"></i>
        </button>
      </th>
    </tr>
    {% for fact in facts %}
      {% include "case/facts/fact-row.html" %}
    {% empty %}
      <tr>
        <td colspan="3" class="empty-message">No facts found for this matter.</td>
      </tr>
    {% endfor %}
  </table>
</div>
