{% load static %}
{% load cache_buster %}
{% load markdown_extras %}
<!DOCTYPE html>
<head>
  <meta charset="UTF-8" content="" />
  <title>AI Prompt - {{ matter.name }}</title>
  <link rel="icon"
        type="image/x-icon"
        href="{% static 'images/ai-favicon.svg' %}" />
  <meta name="viewport" content="width = device-width, initial-scale = 1" />
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
  <link rel="stylesheet" href="{% static_v 'css/palette.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/colors.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/typeography.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/badges.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/buttons.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/icons.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/forms.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/apps/case/ai.css' %}" />
</head>
<body>
  <div class="ai-prompt-container">
    <div class="ai-prompt-header">
      <h1>AI Prompt</h1>
      <span class="app-badge badge-purple">{{ matter.name }}</span>
      <button type="button" class="btn btn-sm btn-primary" id="copyPromptBtn">
        <i class="bi bi-clipboard"></i> Copy to Clipboard
      </button>
    </div>
    <div class="ai-prompt-content ai-markdown">{{ prompt_text|render_markdown }}</div>
    <textarea id="promptPlainText" hidden>{{ prompt_text }}</textarea>
  </div>
  <script>
    document.getElementById('copyPromptBtn').addEventListener('click', function() {
      const promptText = document.getElementById('promptPlainText').value;
      navigator.clipboard.writeText(promptText).then(function() {
        const btn = document.getElementById('copyPromptBtn');
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="bi bi-check"></i> Copied!';
        setTimeout(function() {
          btn.innerHTML = originalHtml;
        }, 2000);
      });
    });
  </script>
</body>
