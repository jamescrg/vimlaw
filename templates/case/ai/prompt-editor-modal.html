{% load static %}
{% load cache_buster %}
<div class="modal-dialog modal-xl prompt-editor-modal" data-modal-static>
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Compose Prompt</h1>
      <div>
        <a href="#" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <div class="prompt-editor-toolbar">
        <button type="button" id="btn-bold" class="btn-icon" title="Bold">
          <i class="icon-bold"></i>
        </button>
        <button type="button" id="btn-italic" class="btn-icon" title="Italic">
          <i class="icon-italic"></i>
        </button>
        <button type="button" id="btn-strike" class="btn-icon" title="Strikethrough">
          <i class="icon-strikethrough"></i>
        </button>
        <span class="toolbar-divider"></span>
        <button type="button" id="btn-h1" class="btn-icon" title="Heading 1">
          <i class="icon-heading-1"></i>
        </button>
        <button type="button" id="btn-h2" class="btn-icon" title="Heading 2">
          <i class="icon-heading-2"></i>
        </button>
        <button type="button" id="btn-h3" class="btn-icon" title="Heading 3">
          <i class="icon-heading-3"></i>
        </button>
        <span class="toolbar-divider"></span>
        <button type="button" id="btn-bullet" class="btn-icon" title="Bullet List">
          <i class="icon-list"></i>
        </button>
        <button type="button" id="btn-ordered" class="btn-icon" title="Numbered List">
          <i class="icon-list-ordered"></i>
        </button>
        <button type="button" id="btn-quote" class="btn-icon" title="Blockquote">
          <i class="icon-quote"></i>
        </button>
        <span class="toolbar-divider"></span>
        <a href="#" id="save-status-btn" title="Saved" onclick="return false;">
          <i class="icon-cloud"></i>
        </a>
      </div>
      <div id="promptEditorContainer" class="prompt-editor-content"></div>
      <form id="promptEditorForm"
            hx-post="{% url 'case:ai-send' matter.id %}"
            hx-target="#messageContainer"
            hx-swap="innerHTML">
        <input type="hidden" name="conversation_id" value="{{ conversation_id }}">
        <input type="hidden" name="llm" value="{{ llm }}">
        <input type="hidden" name="message" id="promptEditorMessage">
      </form>
    </div>
    <div class="modal-footer prompt-editor-footer">
      <button type="button" class="submit" id="promptEditorSubmit">Send to AI</button>
      <div class="prompt-editor-footer-right">
        <button type="button" class="btn btn-outline-primary" id="promptEditorClear">Clear</button>
        <button type="button"
                class="btn btn-outline-primary"
                @click="$dispatch('close-modal')">Cancel</button>
      </div>
    </div>
  </div>
</div>
<script type="module">
  import { initPromptEditor, getMarkdownContent, destroyPromptEditor, hasContent, getHtmlContent, setHtmlContent, clearContent } from '{% static_v "js/prompt-editor.js" %}';

  // Use conversation_id if available, otherwise use 'new-{matter_id}' for new conversations
  const convId = '{{ conversation_id }}' || 'new-{{ matter.id }}';
  const DRAFT_KEY = 'ai-prompt-draft-' + convId;
  const container = document.getElementById('promptEditorContainer');
  const editor = initPromptEditor(container);

  // Focus editor after modal animation completes
  setTimeout(() => {
    editor.commands.focus();
  }, 100);

  // Check for initial text passed from textarea
  const initialText = '{{ initial_text|escapejs }}';

  // Restore draft if available, or use initial text
  const savedDraft = localStorage.getItem(DRAFT_KEY);
  if (savedDraft) {
    setHtmlContent(savedDraft);
  } else if (initialText) {
    // Convert plain text to paragraphs
    const html = initialText.split('\n').map(line => '<p>' + (line || '<br>') + '</p>').join('');
    setHtmlContent(html);
  }

  // Save status management
  let saveTimer = null;
  function updateSaveStatus(status) {
    const btn = document.getElementById('save-status-btn');
    if (!btn) return;
    const icon = btn.querySelector('i');
    if (!icon) return;

    if (status === 'unsaved') {
      btn.classList.add('active');
      btn.title = 'Unsaved changes';
      icon.className = 'icon-cloud-upload';
    } else {
      btn.classList.remove('active');
      btn.title = 'Saved';
      icon.className = 'icon-cloud';
    }
  }

  // Auto-save draft on content changes
  editor.on('update', () => {
    updateSaveStatus('unsaved');
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      const html = getHtmlContent();
      if (html && html !== '<p></p>') {
        localStorage.setItem(DRAFT_KEY, html);
      } else {
        localStorage.removeItem(DRAFT_KEY);
      }
      updateSaveStatus('saved');
    }, 500);
  });

  document.getElementById('promptEditorSubmit').addEventListener('click', function() {
    if (!hasContent()) {
      return;
    }
    const markdown = getMarkdownContent();
    document.getElementById('promptEditorMessage').value = markdown;
    // Clear draft on successful submit
    localStorage.removeItem(DRAFT_KEY);
    document.getElementById('promptEditorForm').requestSubmit();
  });

  // Close modal after form submission completes
  document.getElementById('promptEditorForm').addEventListener('htmx:afterRequest', function() {
    window.dispatchEvent(new CustomEvent('close-modal'));
    updatePromptList();
    scrollMessagesToBottom();
  });

  // Clear button handler
  document.getElementById('promptEditorClear').addEventListener('click', async function() {
    const confirmed = await showConfirm({
      title: 'Clear Editor',
      message: 'Are you sure you want to clear the editor?',
      confirmText: 'Clear',
      isDangerous: true
    });
    if (confirmed) {
      clearContent();
      localStorage.removeItem(DRAFT_KEY);
      updateSaveStatus('saved');
    }
  });

  // Clean up editor when modal closes (but keep draft)
  window.addEventListener('close-modal', function handler() {
    destroyPromptEditor();
    window.removeEventListener('close-modal', handler);
  }, { once: true });
</script>
