<div class="modal-dialog modal-lg">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Edit Highlight</h1>
      <div>
        <a href="#" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="edit-highlight-form"
            {% if not is_viewer_context %}hx-post="{% url 'case:edit-highlight' highlight.id %}" hx-target="#htmx-modal-container"{% else %}novalidate{% endif %}
            action="{% url 'case:edit-highlight' highlight.id %}"
            method="post"
            class="form-compact col3">
        {% csrf_token %}
        {{ form }}
      </form>
    </div>
    <div class="modal-footer">
      {% if not is_viewer_context %}
        <button type="button"
                class="btn btn-danger"
                hx-confirm="Are you sure you want to delete this highlight?"
                hx-post="{% url 'case:delete-highlight' highlight.id %}"
                hx-target="#htmx-modal-container">Delete Highlight</button>
      {% else %}
        <button type="button" class="btn btn-danger">Delete Highlight</button>
      {% endif %}
      <button type="submit" form="edit-highlight-form" class="submit">Submit</button>
    </div>
  </div>
</div>
