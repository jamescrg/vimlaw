<div class="table-container">
  <table id="highlights-list" class="table highlights-list">
    <tr>
      <th class="date">
        Date
        <button class="btn-sort {% if 'date' in current_order %}active{% endif %}"
                hx-get="{% url 'case:highlights-filter-sort' matter.id 'date' %}"
                hx-target="#highlights">
          <i class="bi bi-chevron-expand"></i>
        </button>
      </th>
      <th class="highlight">
        Highlight
        <button class="btn-sort {% if 'slug' in current_order %}active{% endif %}"
                hx-get="{% url 'case:highlights-filter-sort' matter.id 'slug' %}"
                hx-target="#highlights">
          <i class="bi bi-chevron-expand"></i>
        </button>
      </th>
      <th class="importance">
        <button class="btn-sort {% if 'importance' in current_order %}active{% endif %}"
                hx-get="{% url 'case:highlights-filter-sort' matter.id 'importance' %}"
                hx-target="#highlights"
                title="Sort by importance">
          <i class="bi bi-flag"></i>
        </button>
      </th>
    </tr>
    {% for highlight in highlights %}
      {% include "case/highlights/highlight-row.html" %}
    {% empty %}
      <tr>
        <td colspan="3" class="empty-message">No highlights found for this matter.</td>
      </tr>
    {% endfor %}
  </table>
</div>
{% include "pagination.html" %}
