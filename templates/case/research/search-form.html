<div class="research-search-card"
     x-data="{ federal: localStorage.getItem('research_federal') === '1', stateId: localStorage.getItem('research_state') || '', stateLabel: 'All States' }"
     x-init=" {% for state in states %}if (stateId === '{{ state.id }}') stateLabel = '{{ state.name }}';{% endfor %} ">
  <form class="research-search-form"
        hx-post="{% url 'case:research-search' matter.id %}"
        hx-target="#research-refinement"
        hx-swap="innerHTML">
    <div class="research-search-row">
      <input type="hidden" name="state" :value="stateId">
      <div class="dropdown" x-data="dropdown()">
        <button type="button"
                class="select-btn research-filter-btn research-jurisdiction-btn"
                :class="{ 'research-filter-active': stateId !== '' }"
                x-ref="button"
                @click="toggle()"
                :aria-expanded="open">
          <span x-text="stateLabel"></span>
          <small><i class="icon-chevron-down"></i></small>
        </button>
        <ul class="dropdown-menu" x-ref="menu" x-show="open" @click="close()">
          <li>
            <a class="dropdown-item"
               :class="{ active: stateId === '' }"
               href="#"
               @click.prevent="stateId = ''; stateLabel = 'All States'; localStorage.setItem('research_state', '')">All States</a>
          </li>
          {% for state in states %}
            <li>
              <a class="dropdown-item"
                 :class="{ active: stateId === '{{ state.id }}' }"
                 href="#"
                 @click.prevent="stateId = '{{ state.id }}'; stateLabel = '{{ state.name }}'; localStorage.setItem('research_state', '{{ state.id }}')">{{ state.name }}</a>
            </li>
          {% endfor %}
        </ul>
      </div>
      <input type="hidden" name="include_federal" :value="federal ? 'on' : ''">
      <div class="dropdown" x-data="dropdown()">
        <button type="button"
                class="select-btn research-filter-btn research-jurisdiction-btn"
                :class="{ 'research-filter-active': federal }"
                x-ref="button"
                @click="toggle()"
                :aria-expanded="open">
          <span>Federal: <span x-text="federal ? 'Yes' : 'No'"></span></span>
          <small><i class="icon-chevron-down"></i></small>
        </button>
        <ul class="dropdown-menu" x-ref="menu" x-show="open" @click="close()">
          <li>
            <a class="dropdown-item"
               :class="{ active: federal }"
               href="#"
               @click.prevent="federal = true; localStorage.setItem('research_federal', '1')">Yes</a>
          </li>
          <li>
            <a class="dropdown-item"
               :class="{ active: !federal }"
               href="#"
               @click.prevent="federal = false; localStorage.setItem('research_federal', '0')">No</a>
          </li>
        </ul>
      </div>
      <input type="text"
             name="query_text"
             class="research-search-text"
             placeholder="Enter your legal research query..."
             required>
      <button type="submit" class="btn btn-success">
        <i class="icon-search"></i> Search
      </button>
    </div>
  </form>
</div>
