<div class="labels-cards">
  {% if matter %}
    <div class="card">
      <div class="card-header">
        <span>This Matter</span>
        <button type="button"
                class="btn-icon-sm"
                hx-get="{% url 'case:add-label' %}?matter={{ matter.id }}"
                hx-target="#htmx-modal-container"
                data-bs-toggle="modal"
                data-bs-target="#htmx-modal-container">
          <i class="bi bi-plus-lg"></i>
        </button>
      </div>
      <div class="card-body labels-flow">
        {% for label in matter_labels %}
          <a href="#"
             class="app-badge label-{{ label.color }}"
             hx-get="{% url 'case:edit-label' label.id %}"
             hx-target="#htmx-modal-container"
             data-bs-toggle="modal"
             data-bs-target="#htmx-modal-container">{{ label.name }}</a>
        {% empty %}
          <span class="text-muted">No labels for this matter</span>
        {% endfor %}
      </div>
    </div>
  {% endif %}
  <div class="card">
    <div class="card-header">
      <span>All Matters</span>
      <button type="button"
              class="btn-icon-sm"
              hx-get="{% url 'case:add-label' %}?global=1"
              hx-target="#htmx-modal-container"
              data-bs-toggle="modal"
              data-bs-target="#htmx-modal-container">
        <i class="bi bi-plus-lg"></i>
      </button>
    </div>
    <div class="card-body labels-flow">
      {% for label in global_labels %}
        <a href="#"
           class="app-badge label-{{ label.color }}"
           hx-get="{% url 'case:edit-label' label.id %}"
           hx-target="#htmx-modal-container"
           data-bs-toggle="modal"
           data-bs-target="#htmx-modal-container">{{ label.name }}</a>
      {% empty %}
        <span class="text-muted">No global labels</span>
      {% endfor %}
    </div>
  </div>
</div>
