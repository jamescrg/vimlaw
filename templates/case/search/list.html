<div class="search-layout">
  <div class="search-content">
    <div class="search-input-wrapper">
      <div class="search-input-group">
        <input type="search"
               id="search-query-input"
               name="query"
               placeholder="Search..."
               value="{{ query }}"
               class="search-input"
               hx-post="{% url 'case:search-query' matter.id %}"
               hx-target="#search-results"
               hx-trigger="keyup changed delay:500ms"
               hx-include="#search-query-input, .search-scope-checkbox"
               autofocus>
        <span class="search-input-icon"><i class="icon-search"></i></span>
      </div>
      <div id="search-result-count" class="search-result-count">
        {% if query or filter_data %}
          <button class="app-badge app-badge-lg badge-purple search-clear-btn"
                  hx-post="{% url 'case:search-clear' matter.id %}"
                  hx-swap="none"
                  title="Clear search and filters">
            {{ results|length }} result{{ results|length|pluralize }} <i class="icon-x"></i>
          </button>
        {% endif %}
      </div>
    </div>
    <div class="search-scopes">
      <label class="search-scope">
        <input type="checkbox"
               class="search-scope-checkbox"
               name="scope_documents"
               {% if "documents" in active_scopes %}checked{% endif %}
               hx-post="{% url 'case:search-query' matter.id %}"
               hx-trigger="change"
               hx-target="#search-results"
               hx-include="#search-query-input, .search-scope-checkbox">
        Documents
      </label>
      <label class="search-scope">
        <input type="checkbox"
               class="search-scope-checkbox"
               name="scope_highlights"
               {% if "highlights" in active_scopes %}checked{% endif %}
               hx-post="{% url 'case:search-query' matter.id %}"
               hx-trigger="change"
               hx-target="#search-results"
               hx-include="#search-query-input, .search-scope-checkbox">
        Highlights
      </label>
      <label class="search-scope">
        <input type="checkbox"
               class="search-scope-checkbox"
               name="scope_facts"
               {% if "facts" in active_scopes %}checked{% endif %}
               hx-post="{% url 'case:search-query' matter.id %}"
               hx-trigger="change"
               hx-target="#search-results"
               hx-include="#search-query-input, .search-scope-checkbox">
        Facts
      </label>
      <label class="search-scope">
        <input type="checkbox"
               class="search-scope-checkbox"
               name="scope_notes"
               {% if "notes" in active_scopes %}checked{% endif %}
               hx-post="{% url 'case:search-query' matter.id %}"
               hx-trigger="change"
               hx-target="#search-results"
               hx-include="#search-query-input, .search-scope-checkbox">
        Notes
      </label>
    </div>
    <div id="search-results">{% include "case/search/results.html" %}</div>
  </div>
  <aside id="search-filter-panel" class="search-filter-panel">
    {% include "case/search/filter-panel.html" %}
  </aside>
</div>
