<div class="search-layout">
  <div class="search-content">
    <div class="search-input-wrapper">
      <div class="search-input-group">
        <input type="search"
               id="search-query-input"
               name="query"
               placeholder="Search documents, highlights, facts..."
               value="{{ query }}"
               class="search-input"
               hx-post="{% url 'case:search-query' matter.id %}"
               hx-target="#search-results"
               hx-trigger="keyup changed delay:500ms"
               hx-include="this"
               autofocus>
        <span class="search-input-icon"><i class="bi bi-search"></i></span>
      </div>
      <div id="search-result-count" class="search-result-count">
        {% if query or filter_data %}
          <button class="app-badge app-badge-lg badge-purple search-clear-btn"
                  hx-post="{% url 'case:search-clear' matter.id %}"
                  hx-swap="none"
                  title="Clear search and filters">
            {{ results|length }} result{{ results|length|pluralize }} <i class="bi bi-x"></i>
          </button>
        {% endif %}
      </div>
    </div>
    <div id="search-results">{% include "case/search/results.html" %}</div>
  </div>
  <aside id="search-filter-panel" class="search-filter-panel">
    {% include "case/search/filter-panel.html" %}
  </aside>
</div>
