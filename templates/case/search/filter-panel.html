<div class="filter-panel-header">
  <h2>Filters</h2>
  <a href="#"
     hx-post="{% url 'case:search-clear' matter.id %}"
     class="filter-reset">Reset</a>
</div>
<form class="filter-panel-form"
      hx-post="{% url 'case:search-filter' matter.id %}"
      hx-trigger="change delay:300ms">
  {% csrf_token %}
  <div class="filter-group {% if filter_data.result_type %}has-value{% endif %}">
    <label for="id_result_type">Type</label>
    {{ filter.form.result_type }}
  </div>
  <div class="filter-group {% if filter_data.category %}has-value{% endif %}">
    <label for="id_category">Category</label>
    {{ filter.form.category }}
  </div>
  <div class="filter-group {% if filter_data.importance %}has-value{% endif %}">
    <label for="id_importance">Importance</label>
    {{ filter.form.importance }}
  </div>
  <div class="filter-group {% if filter_data.label %}has-value{% endif %}">
    <label for="id_label">Label</label>
    {{ filter.form.label }}
  </div>
  <div class="filter-group {% if filter_data.document %}has-value{% endif %}">
    <label for="id_document">Document</label>
    {{ filter.form.document }}
  </div>
  <div class="filter-group {% if filter_data.date_from %}has-value{% endif %}">
    <label for="id_date_from">Date From</label>
    {{ filter.form.date_from }}
  </div>
  <div class="filter-group {% if filter_data.date_to %}has-value{% endif %}">
    <label for="id_date_to">Date To</label>
    {{ filter.form.date_to }}
  </div>
</form>
