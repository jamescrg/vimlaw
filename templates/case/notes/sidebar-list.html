<div class="sidebar-header">
  <span>
    {% if note.matter %}
      {{ note.matter.name }}
    {% else %}
      Notes
    {% endif %}
  </span>
</div>
<div class="sidebar-panel-toolbar">
  <button class="panel-btn"
          hx-get="{% url 'case:notes-add' note.matter.id %}"
          hx-target="#htmx-modal-container"
          title="New Note">
    <i class="icon-plus"></i>
  </button>
  <div class="dropdown" x-data="dropdown()">
    <button class="panel-btn"
            type="button"
            x-ref="button"
            @click="toggle()"
            :aria-expanded="open"
            title="Sort notes">
      <i class="icon-arrow-down-up"></i>
    </button>
    <ul class="dropdown-menu dropdown-menu-end" x-ref="menu" x-show="open">
      {% for key, label in sidebar_sort_options %}
        <li>
          <a class="dropdown-item {% if current_sort == key %}active{% endif %}"
             href="#"
             hx-get="{% url 'case:note-sidebar-sort' note.id key %}"
             hx-target="#sidebar-list-container">{{ label }}</a>
        </li>
      {% endfor %}
    </ul>
  </div>
</div>
<ul class="sidebar-notes-list">
  {% for n in notes %}
    <li class="{% if n.id == note.id %}active{% endif %}"
        hx-get="{% url 'case:note-content-partial' n.id %}"
        hx-target="#note-editor-container"
        hx-swap="innerHTML"
        hx-push-url="{% url 'case:note-view' n.id %}"
        data-note-id="{{ n.id }}">{{ n.title }}</li>
  {% endfor %}
</ul>
