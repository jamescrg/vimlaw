<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Filter Notes</h1>
      <div>
        <a href="#" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="notes-filter-form"
            hx-post="{% url 'case:notes-filter' matter.id %}"
            hx-target="#htmx-modal-container"
            class="form-compact col2">
        {% csrf_token %}
        {{ filter.form }}
      </form>
    </div>
    <div class="modal-footer">
      <button type="submit" form="notes-filter-form" class="submit">Apply</button>
      <a href="#"
         hx-post="{% url 'case:notes-filter' matter.id %}"
         hx-vals='{"reset": "true"}'
         class="delete-link">Clear Filters</a>
    </div>
  </div>
</div>
