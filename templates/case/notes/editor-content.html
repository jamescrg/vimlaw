<div class="note-canvas">
  <div class="note-header">
    <input type="text"
           id="note-title"
           class="note-title-input"
           data-note-id="{{ note.id }}"
           value="{{ note.title }}">
  </div>
  <div id="note-editor"></div>
</div>
<!-- Floating Reference Picker -->
<div class="sources-picker" id="reference-picker">
  <input type="search"
         id="reference-search"
         name="q"
         placeholder="Search sources..."
         autocomplete="off">
  <div id="reference-results">
    <div class="sources-empty-state">
      <i class="bi bi-search"></i>
      <p>Search for highlights and documents to insert</p>
    </div>
  </div>
</div>
<script>
  window.NOTE_DATA = {
    id: {{ note.id }},
    title: "{{ note.title|escapejs }}",
    content: "{{ note.content|escapejs }}",
    autosaveUrl: "{% url 'case:note-autosave' note.id %}",
    titleUrl: "{% url 'case:note-title' note.id %}",
    searchUrl: "{% url 'case:note-reference-search' note.id %}",
    citationsUrl: "{% url 'case:note-citations' note.id %}",
  };
</script>
