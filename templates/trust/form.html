<div class="modal-dialog modal-lg">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">
        {% if edit %}
          Edit Transaction
        {% else %}
          Add Transaction
        {% endif %}
      </h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="transaction"
            action="{% if edit %}{% url 'trust:edit' id=transaction.id %}{% else %}{% url 'trust:add' %}{% endif %}"
            class="form-responsive trust-transaction-form"
            method="post">
        {% csrf_token %}
        {{ form }}
        <br />
        <div class="flex-center-space">
          <div>
            <button type="submit" class="submit">Submit</button>
          </div>
          <div>
            {% if edit %}
              <a onclick="return confirm('Are you sure you want to delete this record?')"
                 href="{% url 'trust:delete' id=transaction.id %}">Delete Transaction</a>
            {% endif %}
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
