<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">
        {% if edit %}
          Edit Transaction
        {% else %}
          Add Transaction
        {% endif %}
      </h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="transaction-form"
            hx-post="{{ action }}"
            hx-target="#htmx-modal-container"
            role="form"
            class="form-compact col2">
        {% csrf_token %}
        {{ form }}
      </form>
    </div>
    <div class="modal-footer">
      <button type="submit" form="transaction-form" class="submit">Submit</button>
      {% if edit %}
        <a hx-confirm='Are you sure you want to delete this record?'
           href="#"
           hx-delete="{% url 'trust:delete' id=transaction.id %}"
           class="delete-link">Delete Transaction</a>
      {% endif %}
    </div>
  </div>
</div>
