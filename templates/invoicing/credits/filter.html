<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Filter Credits</h1>
      <div>
        <a href="#" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="credits-filter-form"
            class="form-responsive form-spacious filter"
            hx-target="#htmx-modal-container"
            hx-post="{% url 'invoicing:credits-filter' %}">
        {% csrf_token %} {{ filter.form }}
      </form>
    </div>
    <div class="modal-footer">
      <button type="submit" form="credits-filter-form" class="submit">Apply</button>
      <a class="btn-icon"
         href="#"
         hx-post="{% url 'management:clear-filters' session_key='credits_filter' trigger='creditsChanged' %}">Restore Defaults</a>
    </div>
  </div>
</div>
