<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Add Payment</h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="quick-pay-form"
            hx-post="{% url 'invoicing:quick-invoice-payment' pk=invoice.id payment_type=payment_type %}"
            hx-target="#htmx-modal-container"
            class="form-compact col2 invoices-add"
            role="form">
        {% csrf_token %} {{ form }}
      </form>
    </div>
    <div class="modal-footer">
      <button type="submit" form="quick-pay-form" class="submit">Submit</button>
    </div>
  </div>
</div>
