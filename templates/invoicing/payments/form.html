<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Add Payment</h1>
      <div>
        <a href="#" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="payment-form"
            hx-post="{% url 'invoicing:payments-add' %}"
            hx-target="#htmx-modal-container"
            role="form"
            class="form-compact col2">
        {% csrf_token %} {{ form }}
      </form>
    </div>
    <div class="modal-footer">
      <button type="submit" form="payment-form" class="btn btn-success">Submit</button>
    </div>
  </div>
</div>
