{% extends "base.html" %}
{% block content %}
  <div id="content" class="container content">
    {% load humanize %}
    <div id="events"
         hx-trigger="eventsChanged from:body, eventsViewChanged from:body"
         hx-get="{% url 'calendar:list' %}"
         hx-target="this">
      {% if view_mode == "calendar" %}
        {% include "calendar/calendar.html" %}
      {% else %}
        {% include "calendar/list.html" %}
      {% endif %}
    </div>
  </div>
{% endblock content %}
