{% block subcontent %}
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="filter-tools">
        <button type="button" hx-get="/events/add" hx-target="#htmx-modal-container">
          <i class="icon-plus"></i>
        </button>
        <div class="view-toggle">
          <button type="button"
                  class="{% if view_mode == 'list' %}toggle-active{% endif %}"
                  hx-post="{% url 'calendar:view-mode' 'list' %}"
                  hx-swap="none"
                  title="List View">
            <i class="icon-list"></i>
          </button>
          <button type="button"
                  class="{% if view_mode == 'calendar' %}toggle-active{% endif %}"
                  hx-post="{% url 'calendar:view-mode' 'calendar' %}"
                  hx-swap="none"
                  title="Calendar View">
            <i class="icon-calendar"></i>
          </button>
        </div>
        <button type="button"
                hx-get="{% url 'calendar:filter' %}"
                hx-target="#htmx-modal-container">
          <i class="icon-list-filter with-text"></i>Filter
        </button>
        {% include "calendar/status-dropdown.html" %}
        {% include "calendar/assigned-dropdown.html" %}
        {% include "calendar/matter-dropdown.html" %}
      </div>
    </div>
    <div class="toolbar-right">
      <a href="#"
         hx-get="{% url 'calendar:deadline-modal' %}"
         hx-target="#htmx-modal-container">
        <i class="icon-calendar with-text"></i>Deadline Calculator
      </a>
    </div>
  </div>
  <div id="fullcalendar-container"
       x-data="eventsCalendar()"
       x-init="initCalendar()"
       hx-disinherit="*"
       hx-boost="false"></div>
{% endblock subcontent %}
