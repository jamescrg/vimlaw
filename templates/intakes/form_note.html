<div class="modal-dialog modal-lg">
  <div class="modal-content">
    <div class="modal-header">
      <h1>
        {% if edit %}
          Edit Note - {{ intake.name }}
        {% else %}
          Add Note - {{ intake.name }}
        {% endif %}
      </h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="intake-note-form"
            hx-post="{{ action }}"
            hx-target="#htmx-modal-container"
            class="form-responsive form-compact col3 intake-note-form">
        {% csrf_token %}
        {{ form }}
      </form>
    </div>
    <div class="modal-footer">
      <button type="submit" form="intake-note-form" class="submit">Submit</button>
      {% if edit %}
        <a class="delete-link"
           hx-confirm='Are you sure you want to delete this record?'
           href="#"
           hx-post="{% url 'intakes:delete_note' id=note.id %}"
           hx-target="#htmx-modal-container">Delete Note</a>
      {% endif %}
    </div>
  </div>
</div>
