<div class="modal-dialog modal-lg">
  <div class="modal-content">
    <div class="modal-header">
      <h1>
        {% if edit %}
          Edit Note - {{ intake.name }}
        {% else %}
          Add Note - {{ intake.name }}
        {% endif %}
      </h1>
      <div>
        <a href="#" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="intake-note-form"
            hx-post="{{ action }}"
            hx-target="#htmx-modal-container"
            class="form-responsive form-compact col3 intake-note-form">
        {% csrf_token %}
        {{ form }}
      </form>
    </div>
    <div class="modal-footer">
      {% if edit %}
        <button type="button"
                class="btn btn-danger"
                hx-confirm="Are you sure you want to delete this record?"
                hx-post="{% url 'intakes:delete_note' id=note.id %}"
                hx-target="#htmx-modal-container">Delete Note</button>
      {% else %}
        <button type="button"
                class="btn btn-secondary"
                @click="$dispatch('close-modal')">Cancel</button>
      {% endif %}
      <button type="submit" form="intake-note-form" class="btn btn-success">Submit</button>
    </div>
  </div>
</div>
