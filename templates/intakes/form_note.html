<div class="modal-dialog modal-lg">
  <div class="modal-content">
    <div class="modal-header">
      <h1>
        {% if edit %}
          Edit Note - {{ intake.name }}
        {% else %}
          Add Note - {{ intake.name }}
        {% endif %}
      </h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form hx-post="{{ action }}"
            hx-target="#htmx-modal-container"
            class="form-responsive form-spacious intake-note-form">
        {% csrf_token %}
        {{ form }}
        <br />
        <div class="flex-center-space">
          <div>
            <button type="submit" class="submit">Submit</button>
          </div>
          <div>
            {% if edit %}
              <a hx-confirm='Are you sure you want to delete this record?'
                 href="#"
                 hx-post="{% url 'intakes:delete_note' id=note.id %}">Delete Note</a>
            {% endif %}
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
