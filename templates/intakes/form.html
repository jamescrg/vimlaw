<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">
        {% if not edit %}
          Add Intake
        {% else %}
          Edit Intake
        {% endif %}
      </h1>
      <div>
        <a href="#" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="intake-form"
            hx-post="{{ action }}"
            hx-target="#htmx-modal-container"
            role="form"
            class="form-compact col2">
        {% csrf_token %}
        {{ form }}
      </form>
    </div>
    <div class="modal-footer">
      {% if edit %}
        <button type="button"
                class="btn btn-danger confirm"
                data-href="{% url 'intakes:delete' id=intake.id %}"
                data-confirm-title="Delete Intake"
                data-confirm-message="Are you sure you want to delete this intake?"
                data-confirm-text="Delete">Delete Intake</button>
      {% else %}
        <button type="button"
                class="btn btn-secondary"
                @click="$dispatch('close-modal')">Cancel</button>
      {% endif %}
      <button type="submit" form="intake-form" class="btn btn-success">Submit</button>
    </div>
  </div>
</div>
