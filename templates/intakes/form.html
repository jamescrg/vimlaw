<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">
        {% if not edit %}
          Add Intake
        {% else %}
          Edit Intake
        {% endif %}
      </h1>
      <div>
        <a href="#" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="intake-form"
            hx-post="{{ action }}"
            hx-target="#htmx-modal-container"
            role="form"
            class="form-compact col2">
        {% csrf_token %}
        {{ form }}
      </form>
    </div>
    <div class="modal-footer">
      <button type="submit" form="intake-form" class="submit">Submit</button>
      {% if edit %}
        <a href="{% url 'intakes:delete' id=intake.id %}"
           class="delete-link confirm"
           data-confirm-title="Delete Intake"
           data-confirm-message="Are you sure you want to delete this intake?"
           data-confirm-text="Delete">Delete Intake</a>
      {% endif %}
    </div>
  </div>
</div>
