{% load static %}
{% load cache_buster %}
<!DOCTYPE html>
<head>
  <meta charset="UTF-8" content="" />
  <title>
    {% block title %}
      LawAdmin
    {% endblock title %}
  </title>
  {% if env == 'dev' %}
    <link rel="icon"
          type="image/x-icon"
          href="{% static 'images/briefcase-fill-dev.svg' %}" />
  {% else %}
    <link rel="icon"
          type="image/x-icon"
          href="{% static 'images/briefcase-fill.svg' %}" />
  {% endif %}
  <!-- set viewport for mobile devices -->
  <meta name="viewport" content="width = device-width, initial-scale = 1" />
  <!-- Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <!-- bootstrap stylesheet -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        rel="stylesheet" />
  <!-- app stylesheets -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
  <link rel="stylesheet" href="{% static_v 'css/palette.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/colors.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/typeography.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/badges.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/layout.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/sections.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/tables.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/lists.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/modals.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/buttons.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/icons.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/forms.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/interface.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/apps/outlines.css' %}" />
  {% if env == 'dev' %}
    <link rel="stylesheet" href="{% static_v 'css/dev.css' %}" />
  {% endif %}
</head>
<body class="minimal-layout {% if env == 'dev' %}env-dev{% endif %}"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
  {% if env == 'dev' %}
    <div class="dev-banner">
      <span>DEVELOPMENT ENVIRONMENT</span>
    </div>
  {% endif %}
  {% include "modals.html" %}
  {% block content %}
  {% endblock content %}
  <!-- javascript -->
  <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.7.0"></script>
  <script src="{% static_v 'js/htmx-focus.js' %}"></script>
  <script src="{% static_v 'js/main.js' %}"></script>
</body>
