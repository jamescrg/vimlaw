{% extends "agenda/list.html" %}
{% block sub-content %}
  <div class="events">
    <div class="section-title">
      <div class="section-title-left">
        <h1>Events</h1>
        <div class="section-title-left-right">
          <button type="button"
                  class="btn-icon"
                  hx-get="/events/add"
                  hx-target="#htmx-modal-container"
                  hx-trigger="click"
                  data-bs-toggle="modal"
                  data-bs-target="#htmx-modal-container">
            <i class="bi bi-plus-lg"></i>
          </button>
          <button type="button"
                  class="btn-icon"
                  hx-get="{% url 'events:events-filter' %}"
                  hx-target="#htmx-modal-container"
                  hx-trigger="click"
                  data-bs-toggle="modal"
                  data-bs-target="#htmx-modal-container">Filter</button>
          <a href={% url 'events:events-filter-quick' 'pending' %}>Pending</a>
        </div>
      </div>
    </div>
    <div class="table-container">
      <table class="table events-table">
        <tr>
          <th class="date">Date</th>
          <th class="matter">Matter</th>
          <th class="party">Party</th>
          <th class="description">Description</th>
        </tr>
        {% for event in objects %}
          <tr>
            <td class="date">{{ event.date|date:"Y-m-d" }}</td>
            <td class="matter">
              <a href={% url 'matters:detail' id=event.matter.id %}>{{ event.matter.name }}</a>
            </td>
            <td class="party">{{ event.party }}</td>
            <td class="description {% if event.date < three_days_out %}soon{% endif %}">
              <a href="#"
                 type="button"
                 class="btn-icon"
                 hx-get="/events/{{ event.id }}/edit"
                 hx-target="#htmx-modal-container"
                 hx-trigger="click"
                 data-bs-toggle="modal"
                 data-bs-target="#htmx-modal-container">{{ event.description }}</a>
            </td>
          </tr>
        {% endfor %}
      </table>
      {% include "pagination.html" %}
    </div>
  </div>
{% endblock sub-content %}
