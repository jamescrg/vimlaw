{% extends "base.html" %}
{% block content %}
  <div id="content" class="container content">
    <div class="section">
      <nav class="section-nav">
        <ul>
          <li {% if subapp == "dash" %}class="active"{% endif %}>
            <a href="{% url 'agenda:dash-index' %}">Dash</a>
          </li>
          <li {% if subapp == "events" %}class="active"{% endif %}>
            <a href="{% url 'agenda:events-select' %}">Events</a>
          </li>
          <li {% if subapp == "tasks" %}class="active"{% endif %}>
            <a href="{% url 'agenda:tasks-select' %}">Tasks</a>
          </li>
        </ul>
      </nav>
      <div class="section-body">
        {% block subcontent %}
        {% endblock subcontent %}
      </div>
    </div>
  </div>
{% endblock content %}
