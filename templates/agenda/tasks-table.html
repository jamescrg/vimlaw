<div id="tasks-table" class="table-container">
  <table class="table tasks-table">
    <tr>
      <th class="status">
        <button class="btn-task-sort btn-task-status"
                hx-target="#tasks-table"
                hx-swap="outerHTML"
                hx-post="/agenda/filter/sort/status">
          <i class="bi bi-chevron-expand"></i>
        </button>
      </th>
      <th class="matter">
        Matter
        <button class="btn-task-sort"
                hx-target="#tasks-table"
                hx-swap="outerHTML"
                hx-post="/agenda/filter/sort/matter">
          <i class="bi bi-chevron-expand"></i>
        </button>
      </th>
      <th class="description">
        Description
        <button class="btn-task-sort"
                hx-target="#tasks-table"
                hx-swap="outerHTML"
                hx-post="/agenda/filter/sort/description">
          <i class="bi bi-chevron-expand"></i>
        </button>
      </th>
      <th>
        User
        <button class="btn-task-sort"
                hx-target="#tasks-table"
                hx-swap="outerHTML"
                hx-post="/agenda/filter/sort/user">
          <i class="bi bi-chevron-expand"></i>
        </button>
      </th>
      <th class="date">
        Date
        <button class="btn-task-sort"
                hx-target="#tasks-table"
                hx-swap="outerHTML"
                hx-post="/agenda/filter/sort/date_due">
          <i class="bi bi-chevron-expand"></i>
        </button>
      </th>
    </tr>
    {% for task in tasks %}
      <tr>
        <td id="task-status" class="status">{% include "agenda/task-status.html" %}</td>
        <td id="task-matter" class="matter">
          <a href={% url 'matters:detail' id=task.matter.id %}>{{ task.matter.name }}</a>
        </td>
        <td id="task-description" class="description">
          {% if task.priority %}
            <span class="priority">
              <i class="bi bi-exclamation-lg"></i>
            </span>
          {% endif %}
          <a href="#"
             hx-get="/agenda/{{ task.id }}/edit"
             hx-target="#htmx-modal-container"
             hx-trigger="click"
             data-bs-toggle="modal"
             data-bs-target="#htmx-modal-container"
             hx-swap="innerHTML">{{ task.description }}</a>
        </td>
        <td id="task-user" class="user">
          <select name="user"
                  class="edit-user"
                  hx-post="/agenda/{{ task.id }}/edit-user"
                  hx-target="this"
                  hx-swap="outerHTML"
                  hx-trigger="change">
            {% for user in users %}
              <option value="{{ user.id }}" {% if user == task.user %}selected{% endif %}>{{ user.username }}</option>
            {% endfor %}
          </select>
        </td>
        <td id="task-date" class="date">{{ task.date_due|date:'Y-m-d' }}</td>
      </tr>
    {% endfor %}
  </table>
</div>
