<select name="user"
        class="change-user"
        hx-post="/agenda/tasks/{{ task.id }}/change-user"
        hx-target="this"
        hx-swap="outerHTML"
        hx-trigger="change">
  {% for user in users %}
    <option value="{{ user.id }}" {% if user == task.user %}selected{% endif %}>{{ user.username|title }}</option>
  {% endfor %}
</select>
