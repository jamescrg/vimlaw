<div class="dropdown" x-data="dropdown()">
  <button class="button-link"
          type="button"
          x-ref="button"
          @click="toggle()"
          :aria-expanded="open">{{ task.user.username|title }}</button>
  <ul class="dropdown-menu" x-ref="menu" x-show="open">
    {% for user in users %}
      <li>
        <a class="dropdown-item"
           href="#"
           hx-get="{% url 'agenda:tasks-task-user' task_id=task.id user=user.id %}"
           hx-target="#tasks"><i class="icon-user"></i> {{ user.username|title }}</a>
      </li>
    {% endfor %}
  </ul>
</div>
