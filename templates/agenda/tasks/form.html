<div class="modal-dialog modal-lg">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">
        {% if edit %}
          Edit Task
        {% else %}
          Add Task
        {% endif %}
      </h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="task-form"
            hx-post="{{ action }}"
            hx-trigger="submit"
            hx-target="#task-form"
            hx-swap="none"
            class="new-form-responsive tasks-form"
            method="post"
            novalidate
            role="form">
        {% csrf_token %}
        {% for field in form %}
          <div class="form-group">
            {{ field.label_tag }} {{ field }}
            <div></div>
            <!-- noqa -->
            <div id="{{ field.id_for_label }}-error" class="form-error-message"></div>
          </div>
        {% endfor %}
        <br />
        <div class="flex-center-space">
          <div>
            <button type="submit" class="submit">Submit</button>
          </div>
          <div>
            {% if edit %}
              <a onclick="return confirm('Are you sure you want to delete this record?')"
                 href="{% url 'agenda:tasks-delete' id=task.id %}">Delete Task</a>
            {% endif %}
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
