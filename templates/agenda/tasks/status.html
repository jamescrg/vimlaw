<a href="#"
   class="task-status-link"
   id="task-{{ task.id }}"
   hx-get="/agenda/tasks/{{ task.id }}/task-status"
   hx-target="closest .task-status-link"
   hx-swap="outerHTML">
  {% if task.status == "Complete" %}
    <i class="bi bi-check-square"></i>
  {% else %}
    <i class="bi bi-square"></i>
  {% endif %}
</a>
