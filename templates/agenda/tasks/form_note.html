<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">
        {% if edit %}
          Edit Note
        {% else %}
          Add Note
        {% endif %}
      </h1>
      <div>
        <a class="btn-icon"
           href="#"
           hx-get="{% url 'agenda:tasks-detail' id=task.id %}"
           hx-target="#htmx-modal-container"
           hx-trigger="click">
          <i class="icon-arrow-left"></i>
        </a>
        <a href="#" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form id="task-note-form"
            hx-post="{{ action }}"
            hx-target="#htmx-modal-container"
            class="form-responsive form-compact col3 task-note-form">
        {% csrf_token %}
        {{ form }}
        <div class="char-counter">
          <span id="char-count">300</span> characters remaining
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="submit" form="task-note-form" class="submit">Submit</button>
      {% if edit %}
        <a class="delete-link"
           hx-confirm='Are you sure you want to delete this note?'
           href="#"
           hx-post="{% url 'agenda:tasks-delete-note' id=note.id %}"
           hx-target="#htmx-modal-container">Delete</a>
      {% endif %}
    </div>
  </div>
</div>
<script>
  (function() {
    const textarea = document.querySelector('.task-note-form textarea');
    const counter = document.getElementById('char-count');
    const maxLength = 300;

    function updateCounter() {
      const remaining = maxLength - textarea.value.length;
      counter.textContent = remaining;
      if (remaining < 0) {
        counter.style.color = 'var(--orange-800)';
      } else {
        counter.style.color = '';
      }
    }

    if (textarea) {
      textarea.setAttribute('maxlength', maxLength);
      textarea.addEventListener('input', updateCounter);
      updateCounter();
    }
  })();
</script>
