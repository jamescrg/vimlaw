{% extends "agenda/list.html" %}
{% block subcontent %}
  {% load humanize %}
  <div class="section-title">
    <div class="section-title-left">
      <h1>Tasks</h1>
      <div class="section-title-left-right"
           hx-target="#tasks-table"
           hx-swap="#outerHTML">
        <button type="button"
                class="btn-icon"
                hx-get="{% url 'agenda:tasks-filter' %}"
                hx-target="#htmx-modal-container"
                hx-trigger="click"
                data-bs-toggle="modal"
                data-bs-target="#htmx-modal-container">Filter</button>
        <a href="{% url 'agenda:tasks-filter-user' 'All' %}">All</a>
        <a href="{% url 'agenda:tasks-filter-user' 'james' %}">James</a>
        <a href="{% url 'agenda:tasks-filter-user' 'lexi' %}">Lexi</a>
      </div>
    </div>
  </div>
  {% include "agenda/tasks/form-add.html" %}
  {% include "agenda/tasks/table.html" %}
{% endblock subcontent %}
