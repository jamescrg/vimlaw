<div class="dropdown">
  <button class="button-link"
          type="button"
          data-bs-toggle="dropdown"
          aria-expanded="false">{{ task.focus|default:"None set" }}</button>
  <ul class="dropdown-menu">
    <li>
      <a class="dropdown-item"
         href="#"
         hx-get="{% url 'agenda:tasks-task-focus' task_id=task.id focus="Current" %}"
         hx-target="#tasks">Current</a>
      <a class="dropdown-item"
         href="#"
         hx-get="{% url 'agenda:tasks-task-focus' task_id=task.id focus="Long Term" %}"
         hx-target="#tasks">Long Term</a>
    </li>
  </ul>
</div>
