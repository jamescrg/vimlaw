{% extends "registration/base.html" %}
{% block title %}
  Forgot Your Password?
{% endblock title %}
{% block content %}
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-title">{{ site_handle }}</div>
      <div class="auth-subtitle">Password Reset</div>
      <div class="prompt">Please enter the email address associated with your account.</div>
      <form id="password-reset-form" class="account-form" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="auth-buttons justify-between">
          <a class="btn btn-secondary" href="{% url 'accounts:login' %}">Cancel</a>
          <button type="submit" class="btn btn-success">Submit</button>
        </div>
      </form>
    </div>
  </div>
{% endblock content %}
