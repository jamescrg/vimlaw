{% load static %}
{% load cache_buster %}
<!DOCTYPE html>
<meta charset="UTF-8" content="" />
<title>Aletheia</title>
<link rel="icon"
      type="image/x-icon"
      href="{% static 'images/aletheia-mark.svg' %}" />
<!-- set viewport for mobile devices -->
<meta name="viewport" content="width = device-width, initial-scale = 1" />
<!-- Bootstrap Reboot (CSS reset) -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-reboot.min.css">
<!-- app stylesheets -->
<link rel="stylesheet" href="{% static_v 'css/palette.css' %}" />
<link rel="stylesheet" href="{% static_v 'css/colors.css' %}" />
<link rel="stylesheet" href="{% static_v 'css/typeography.css' %}" />
<link rel="stylesheet" href="{% static_v 'css/layout.css' %}" />
<link rel="stylesheet" href="{% static_v 'css/buttons.css' %}" />
<link rel="stylesheet" href="{% static_v 'css/apps/accounts.css' %}" />
<script>
  /* Apply the user's theme before paint (mirrors base.html). */
  (function () {
    var setting = localStorage.getItem('theme') || 'auto';
    var dark = setting === 'dark' || (setting === 'auto' &&
      window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  })();
</script>
<div class="container vertical-center">
  {% block content %}
  {% endblock content %}
</div>
