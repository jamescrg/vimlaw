{% extends "registration/base.html" %}
{% block title %}
  Verify Code
{% endblock title %}
{% block content %}
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-title">{{ site_handle }}</div>
      <p class="auth-info">Enter the verification code sent to your email.</p>
      {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
      <form id="verify-form" class="account-form" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="flex-container login-bottom">
          <div class="login-bottom-right">
            <button type="submit">Verify</button>
          </div>
          <div class="login-bottom-left">
            <a href="{% url 'accounts:login' %}">Back to Login</a>
          </div>
        </div>
      </form>
    </div>
  </div>
{% endblock content %}
