<div class="contacts col-md-3">
  <div class="section">
    <div class="toolbar">
      <div class="toolbar-left">
        <h1>Contacts</h1>
      </div>
      <div class="toolbar-right">
        <a href={% url 'contacts:add' %}>
          <i class="bi bi-plus-lg"></i>
        </a>
      </div>
    </div>
    {% if contacts %}
      {% include "contacts/list.html" %}
    {% else %}
      <ul class="list-group">
        <li class="list-group-item">No contacts selected.</li>
      </ul>
    {% endif %}
  </div>
</div>
<div class="contact col-md-6">
  {% if selected_contact %}
    {% include "contacts/contact.html" %}
  {% endif %}
</div>
