{% extends "base.html" %}
{% block content %}

    <div class="col-sm-12">
        <div class="section-title">
            Assign Contact to Matter
        </div>
        <form action="{{ action }}" method="post" role="form">

            {% csrf_token %}

            <table>

                <tr>

                    <th>Matter:</th>
                    <td>
                        <label>
                            <select class="select-field" name="matter_id">

                                {% for matter in matters %}

                                    <option value="{{ matter.id }}">{{ matter.name }}</option>

                                {% endfor %}

                            </select>
                        </label>
                    </td>

                </tr>

                <tr>
                    <th>Role:
                    </th>

                    <td>

                        <label>
                            <select class="select-field" name="role_id">

                                {% for role in roles %}

                                    <option value="{{ role.id }}">{{ role.name }}</option>

                                {% endfor %}

                            </select>
                        </label>
                    </td>

                </tr>

                <tr>

                    <td></td>

                    <td>
                        <input type="submit" value="Submit"/>
                    </td>

                </tr>
            </table>
        </form>

    </div>

{% endblock content %}
