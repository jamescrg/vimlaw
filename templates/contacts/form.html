<div class="col-sm-9 col-sm-push-3">
  <div class="section">
    <div class="toolbar">
      <div class="toolbar-left">
        <h1>
          {% if not edit %}
            Add Contact
          {% else %}
            Edit Contact
          {% endif %}
        </h1>
      </div>
    </div>
    <form {% if action_type == 'db_update' %}action="{{ action }}"{% else %}hx-post="{{ action }}"{% endif %}
          method="post"
          role="form"
          class="form-responsive contacts-form">
      {% csrf_token %}
      {% if intake_id %}<input type="hidden" name="intake_id" value="{{ intake_id }}" />{% endif %}
      {{ form }}
      <br />
      <div class="flex-center-space">
        <div>
          <button type="submit" class="submit">Submit</button>
        </div>
        <div>
          {% if edit %}
            <a onclick="return confirm('Are you sure you want to delete this record?')"
               href="{% url 'contacts:delete' id=contact.id %}">Delete Contact</a>
          {% endif %}
        </div>
      </div>
    </form>
  </div>
</div>
