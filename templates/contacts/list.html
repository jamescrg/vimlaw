<ul class="list-group">
  {% if contacts %}
    {% for contact in contacts %}
      <li class="list-group-item{% if selected_contact and selected_contact.id == contact.id %} item-selected-highlight{% endif %}">
        <a href="{% url 'contacts:select' contact_id=contact.id %}">{{ contact.name }}</a>
      </li>
    {% endfor %}
  {% endif %}
</ul>
