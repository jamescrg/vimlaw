{% extends "base.html" %}
{% block content %}
  <div id="content" class="container content">
    <div>
      <table>
        {% for contact in contacts %}
          <tr>
            <td>{{ contact.name }}</td>
            <td>
              <a href={% url 'contacts:toggle-google-sync' id=contact.id %}>
                <span class="material-icons">sync</span>
              </a>
            </td>
          </tr>
        {% endfor %}
      </table>
    </div>
  </div>
{% endblock content %}
