<div class="table-container">
  <table id="notes-list" class="table notes-list">
    <tr>
      <th class="col-select">
        {% url 'notes:select-all' as select_all_url %}
        {% include "selection/select-all-btn.html" with select_all_url=select_all_url all_selected=all_selected %}
      </th>
      <th class="title">
        Title
        <button class="btn-sort {% if 'title' in current_order %}active{% endif %}"
                hx-get="{% url 'notes:order-by' 'title' %}"
                hx-target="#notes">
          <i class="icon-chevrons-up-down"></i>
        </button>
      </th>
      <th class="user">Author</th>
      <th class="created">
        Created
        <button class="btn-sort {% if 'created_at' in current_order %}active{% endif %}"
                hx-get="{% url 'notes:order-by' 'created_at' %}"
                hx-target="#notes">
          <i class="icon-chevrons-up-down"></i>
        </button>
      </th>
      <th class="updated">
        Updated
        <button class="btn-sort {% if 'updated_at' in current_order %}active{% endif %}"
                hx-get="{% url 'notes:order-by' 'updated_at' %}"
                hx-target="#notes">
          <i class="icon-chevrons-up-down"></i>
        </button>
      </th>
      <th class="importance">
        <button class="btn-sort {% if 'importance' in current_order %}active{% endif %}"
                hx-get="{% url 'notes:order-by' 'importance' %}"
                hx-target="#notes"
                title="Sort by importance">
          <i class="icon-flag"></i>
        </button>
      </th>
    </tr>
    {% for note in notes %}
      {% include "notes/row.html" %}
    {% empty %}
      <tr>
        <td colspan="6" class="empty-message">No notes found.</td>
      </tr>
    {% endfor %}
  </table>
</div>
