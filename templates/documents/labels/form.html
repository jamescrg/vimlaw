<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">
        {% if edit %}
          Edit Label
        {% else %}
          Add Label
        {% endif %}
      </h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form role="form"
            class="form-compact col2"
            hx-post="{% if edit %}{% url 'documents:edit-label' label.id %}{% else %}{% url 'documents:add-label' %}{% endif %}"
            hx-target="#htmx-modal-container"
            id="label-form">
        {% csrf_token %}
        {{ form }}
        <div class="flex-center-space span2">
          <div>
            <button type="submit" class="submit">Submit</button>
          </div>
          <div>
            {% if edit %}
              <a class="delete-link"
                 href="#!"
                 hx-confirm="Are you sure you want to delete this label?"
                 hx-delete="{% url 'documents:delete-label' label.id %}"
                 hx-target="#htmx-modal-container">Delete Label</a>
            {% endif %}
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
