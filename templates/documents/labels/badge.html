<span class="label-badge dropdown">
  <a href="#"
     class="badge-link label-{{ label.color }}"
     data-bs-toggle="dropdown"
     aria-expanded="false">{{ label.name }}</a>
  <ul class="dropdown-menu">
    <li>
      <a class="dropdown-item text-danger"
         href="#"
         hx-post="{% url 'documents:remove-label-from' object_type object.id %}"
         hx-vals='{"label_id": "{{ label.id }}"}'
         hx-target="#{{ object_type }}-{{ object.id }}"
         hx-swap="outerHTML">Remove</a>
    </li>
  </ul>
</span>
