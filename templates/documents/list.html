{% block content %}
  <div class="section">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="filter-tools">
          <button type="button"
                  class="btn-icon"
                  hx-get="{% url 'documents:add' %}"
                  hx-target="#htmx-modal-container"
                  hx-trigger="click"
                  data-bs-toggle="modal"
                  data-bs-target="#htmx-modal-container">
            <i class="bi bi-plus-lg"></i>
          </button>
          <button type="button"
                  class="btn-icon"
                  hx-get="{% url 'documents:filter' %}"
                  hx-target="#htmx-modal-container"
                  hx-trigger="click"
                  data-bs-toggle="modal"
                  data-bs-target="#htmx-modal-container">
            <i class="bi bi-filter"></i> &nbsp;Filter
          </button>
          <button type="button"
                  id="documents-matter-filter"
                  class="select-btn large-btn toggle-active"
                  data-bs-toggle="dropdown"
                  aria-expanded="false">
            {{ selected_matter|default:"Select Matter" }}
            <small>
              <i class="bi bi-chevron-down"></i>
            </small>
          </button>
          <ul class="dropdown-menu"
              hx-target="#documents-matter-filter"
              hx-swap="outerHTML">
            {% for matter in matters %}
              <li>
                <a class="dropdown-item {% if matter.id == matter_id %}active{% endif %}"
                   href="#"
                   hx-post="{% url 'documents:filter-matter' matter.id %}"
                   hx-target="#documents"
                   hx-swap="#outerHTML">{{ matter.name }}</a>
              </li>
            {% endfor %}
          </ul>
        </div>
      </div>
    </div>
    <div class="table-container">
      <table id="documents-list" class="table">
        <tr>
          <th>
            Date
            <a href="#" hx-get="{% url 'documents:sort' 'date' %}">
              <i class="bi bi-chevron-expand"></i>
            </a>
          </th>
          <th>
            Document
            <a href="#" hx-get="{% url 'documents:sort' 'name' %}">
              <i class="bi bi-chevron-expand"></i>
            </a>
          </th>
          <th>
            Uploaded at
            <a href="#" hx-get="{% url 'documents:sort' 'uploaded_at' %}">
              <i class="bi bi-chevron-expand"></i>
            </a>
          </th>
          <td class="download">
            <i class="bi bi-download"></i>
          </td>
        </tr>
        {% if objects %}
          {% for document in objects %}
            {% include "documents/row.html" %}
          {% endfor %}
        {% endif %}
      </table>
    </div>
    <div class="flex-start-space">
      <div>{% include "pagination.html" %}</div>
    </div>
  </div>
{% endblock content %}
