{% load static %}
{% load cache_buster %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="description" content="Document viewer for {{ document.name }}">
    <meta name="keywords" content="document, pdf, viewer">
    <title>{{ document.name }} - Document Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Custom stylesheets -->
    <link rel="stylesheet" href="{% static_v 'css/colors.css' %}">
    <link rel="stylesheet" href="{% static_v 'css/buttons.css' %}">
    <link rel="stylesheet" href="{% static_v 'css/forms.css' %}">
    <link rel="stylesheet" href="{% static_v 'css/layout.css' %}">
    <link rel="stylesheet" href="{% static_v 'css/modals.css' %}">
    <style>
      * {
        box-sizing: border-box;
      }

      *:focus,
      *:focus-visible,
      button:focus,
      .btn:focus,
      .btn:focus-visible {
        outline: none !important;
        box-shadow: none !important;
      }

      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: "Open Sans", sans-serif;
      }

      /* Main container */
      #main-container {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
      }

      /* PDF iframe container */
      #pdf-iframe-container {
        flex: 1;
        background: #e7e5e4;
      }

      #pdf-iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      /* Highlights Sidebar */
      #highlights-sidebar {
        width: 280px;
        background: var(--stone-200);
        border-left: 1px solid var(--stone-400);
        overflow-y: auto;
        padding: 16px;
        flex-shrink: 0;
      }

      #highlights-sidebar h4 {
        margin: 0 0 16px 0;
        font-size: 1rem;
        color: var(--stone-700);
      }

      .highlight-item {
        padding: 12px;
        background: var(--stone-50);
        border: 1px solid var(--stone-300);
        border-radius: 4px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: background-color 0.15s;
        position: relative;
      }

      .highlight-item:hover {
        background: var(--stone-100);
      }

      .highlight-item.active {
        background: var(--stone-100);
      }

      .highlight-slug {
        font-size: 0.9rem;
      }

      .highlight-actions {
        display: flex;
        gap: 1.25rem;
        margin-top: 0.75rem;
      }

      .highlight-actions .btn {
        padding: 0;
        color: var(--stone-400);
        font-size: 1rem;
      }

      .highlight-actions .btn:hover {
        color: var(--stone-700);
      }

      .no-highlights {
        color: var(--stone-400);
        text-align: center;
        padding: 20px;
        font-size: 0.875rem;
      }

      /* Highlight colors - selected state (border uses -300 values) */
      .highlight-item.hl-yellow.active {
        border: 2px solid var(--yellow-400);
      }

      .highlight-item.hl-green.active {
        border: 2px solid var(--lime-400);
      }

      .highlight-item.hl-blue.active {
        border: 2px solid var(--blue-400);
      }

      .highlight-item.hl-orange.active {
        border: 2px solid var(--orange-400);
      }

      .highlight-item.hl-red.active {
        border: 2px solid var(--red-400);
      }

      .highlight-item.hl-purple.active {
        border: 2px solid var(--violet-400);
      }

      /* Modal */
      .modal-content {
        background: var(--stone-100);
      }

      .modal-header {
        border-bottom: 1px solid var(--stone-300);
      }

      .modal-header .modal-title {
        font-size: 1.25rem;
        font-weight: 500;
      }

      .modal-header a {
        color: var(--stone-500);
        text-decoration: none;
      }

      .modal-header a:hover {
        color: var(--stone-700);
      }

      .modal-footer {
        border-top: 1px solid var(--stone-300);
      }

      #highlight-form .form-control,
      #highlight-form .form-select {
        background: var(--stone-50);
        border: 1px solid var(--stone-300);
      }

      #highlight-form .form-control:focus,
      #highlight-form .form-select:focus {
        outline: none;
        box-shadow: none;
        border-color: var(--stone-400);
      }

      .highlight-color-row {
        width: 33%;
      }

      #highlight-form textarea {
        font-size: 0.875rem;
        line-height: 1.5;
      }

      .modal-footer {
        display: flex;
        flex-direction: row-reverse;
        justify-content: flex-end;
        gap: 1rem;
      }

      .modal-footer .submit {
        background: var(--lime-800);
        border: none;
        border-radius: 4px;
        color: var(--stone-100);
        padding: 0.375rem 1rem;
        cursor: pointer;
      }

      .modal-footer .submit:hover {
        background: var(--lime-900);
      }

      /* Edit modal grid - matches highlights.css */
      .highlight-edit-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
      }
    </style>
  </head>
  <body>
    <!-- Main container -->
    <div id="main-container">
      <!-- PDF iframe -->
      <div id="pdf-iframe-container">
        <iframe id="pdf-iframe"
                src="{% static 'pdfjs/web/viewer.html' %}?file={% url 'documents:serve' document.id %}&page={{ initial_page|default:1 }}">
        </iframe>
      </div>
      <!-- Highlights Sidebar -->
      <div id="highlights-sidebar">
        <div id="highlights-list">
          {% for highlight in highlights %}
            <div class="highlight-item hl-{{ highlight.color }} unselected"
                 data-highlight-id="{{ highlight.id }}"
                 data-page="{{ highlight.page_number }}"
                 data-color="{{ highlight.color }}">
              <div class="highlight-slug">{{ highlight.slug }}</div>
              <div class="highlight-actions">
                <button class="btn btn-link edit-highlight"
                        data-highlight-id="{{ highlight.id }}"
                        title="Edit">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-link delete-highlight"
                        data-highlight-id="{{ highlight.id }}"
                        title="Delete">
                  <i class="bi bi-trash3"></i>
                </button>
              </div>
            </div>
          {% empty %}
            <div class="no-highlights">No highlights yet. Select text in the PDF and click "+ Highlight" to create one.</div>
          {% endfor %}
        </div>
      </div>
    </div>
    <!-- Highlight Creation Modal -->
    <div id="highlight-modal" class="modal fade" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Create Highlight</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="highlight-form" onsubmit="return false">
              <input type="hidden" id="highlight-page" name="page_number">
              <input type="hidden" id="highlight-coords" name="coordinates">
              <div class="mb-3 highlight-color-row">
                <label for="highlight-color" class="form-label">Color</label>
                <select class="form-select" id="highlight-color" name="color">
                  <option value="yellow">Yellow</option>
                  <option value="green">Green</option>
                  <option value="blue">Blue</option>
                  <option value="orange">Orange</option>
                  <option value="red">Red</option>
                  <option value="purple">Purple</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="highlight-slug" class="form-label">Slug</label>
                <input type="text"
                       class="form-control"
                       id="highlight-slug"
                       name="slug"
                       required>
              </div>
              <div class="mb-3">
                <label for="highlight-text" class="form-label">Text</label>
                <textarea class="form-control" id="highlight-text" name="text" rows="6"></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" id="save-highlight" class="submit">Save</button>
          </div>
        </div>
      </div>
    </div>
    <!-- Edit Highlight Modal (loaded dynamically) -->
    <div id="edit-highlight-modal" class="modal fade" tabindex="-1">
      <div id="edit-highlight-modal-content"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
    // Color name to hex mapping (-400 variants)
    const colorMap = {
      yellow: '#facc15',
      green: '#a3e635',
      blue: '#60a5fa',
      orange: '#fb923c',
      red: '#f87171',
      violet: '#c084fc'
    };

    // Configuration
    const config = {
      documentId: {{ document.id }},
      csrfToken: "{{ csrf_token }}",
      existingHighlights: {{ highlights_json|safe }},
      initialHighlight: {{ initial_highlight|default:"null" }}
    };

    const iframe = document.getElementById('pdf-iframe');
    let currentSelection = null;
    let selectedHighlightId = null;

    // Wait for iframe to be ready
    window.addEventListener('message', function(evt) {
      const data = evt.data;

      switch (data.type) {
        case 'viewerReady':
          console.log('PDF viewer ready, pages:', data.numPages);
          // Auto-select initial highlight if specified (e.g., deep-link)
          if (config.initialHighlight) {
            const highlight = config.existingHighlights.find(h => h.id === config.initialHighlight);
            if (highlight) {
              selectHighlight(highlight.id);
              iframe.contentWindow.postMessage({
                type: 'scrollToHighlight',
                highlightId: highlight.id,
                page: highlight.page_number
              }, '*');
            }
          } else {
            // No initial highlight - send empty highlights to viewer
            sendHighlightsToViewer();
          }
          break;

        case 'pageChanged':
          console.log('Page changed to:', data.page);
          break;

        case 'selectionChanged':
          currentSelection = data.selection;
          break;

        case 'selectionCleared':
          currentSelection = null;
          break;

        case 'createHighlight':
          currentSelection = data.selection;
          showHighlightModal();
          break;

        case 'highlightClicked':
          // Toggle selection when clicking highlight in PDF
          if (selectedHighlightId === data.highlightId) {
            selectHighlight(null);
          } else {
            selectHighlight(data.highlightId);
          }
          break;

        case 'pdfBackgroundClicked':
          // Deselect when clicking outside highlight
          if (selectedHighlightId !== null) {
            selectHighlight(null);
          }
          break;

        case 'download':
          window.location.href = '{% url "documents:files-download" document.id %}';
          break;
      }
    });

    // Deselect highlight when clicking on PDF container (detected via iframe blur)
    window.addEventListener('blur', () => {
      // Check if focus went to the iframe
      setTimeout(() => {
        if (document.activeElement === iframe && selectedHighlightId !== null) {
          // User clicked in iframe - deselect unless they clicked a highlight
          // We'll get a highlightClicked message if they clicked a highlight,
          // which will re-select. Use a small delay to let that message arrive first.
          const currentSelected = selectedHighlightId;
          setTimeout(() => {
            // If selection hasn't changed (no highlightClicked received), deselect
            if (selectedHighlightId === currentSelected) {
              selectHighlight(null);
            }
          }, 100);
        }
      }, 0);
    });

    function sendHighlightsToViewer() {
      // Only send the selected highlight (if any)
      const selectedOnly = selectedHighlightId
        ? config.existingHighlights.filter(h => h.id === selectedHighlightId)
        : [];
      // Convert color names to hex for the PDF viewer
      const highlightsWithHex = selectedOnly.map(h => ({
        ...h,
        color: colorMap[h.color] || h.color
      }));
      iframe.contentWindow.postMessage({
        type: 'setHighlights',
        highlights: highlightsWithHex
      }, '*');
    }

    function showHighlightModal() {
      if (!currentSelection) return;

      document.getElementById('highlight-page').value = currentSelection.page;
      document.getElementById('highlight-coords').value = JSON.stringify({ rects: currentSelection.rects });
      document.getElementById('highlight-slug').value = '';
      document.getElementById('highlight-text').value = currentSelection.text;

      const modal = new bootstrap.Modal(document.getElementById('highlight-modal'));
      modal.show();
    }

    // Save highlight
    document.getElementById('save-highlight').addEventListener('click', async function() {
      const form = document.getElementById('highlight-form');
      const formData = new FormData(form);

      try {
        const response = await fetch(`/files/${config.documentId}/highlights/add/`, {
          method: 'POST',
          body: formData,
          headers: {
            'X-CSRFToken': config.csrfToken
          }
        });

        if (response.ok) {
          const highlight = await response.json();
          config.existingHighlights.push(highlight);

          // Close modal
          bootstrap.Modal.getInstance(document.getElementById('highlight-modal')).hide();

          // Clear selection in parent and iframe
          currentSelection = null;
          iframe.contentWindow.postMessage({ type: 'clearSelection' }, '*');

          // Update sidebar
          addHighlightToSidebar(highlight);

          // Auto-select the new highlight
          selectHighlight(highlight.id);
        } else {
          const error = await response.json();
          alert('Error saving highlight: ' + (error.error || 'Unknown error'));
        }
      } catch (error) {
        console.error('Error saving highlight:', error);
        alert('Error saving highlight');
      }
    });

    function addHighlightToSidebar(highlight) {
      const list = document.getElementById('highlights-list');
      const noHighlights = list.querySelector('.no-highlights');
      if (noHighlights) noHighlights.remove();

      const item = document.createElement('div');
      item.className = `highlight-item hl-${highlight.color} unselected`;
      item.dataset.highlightId = highlight.id;
      item.dataset.page = highlight.page_number;
      item.dataset.color = highlight.color;
      item.innerHTML = `
        <div class="highlight-slug">${escapeHtml(highlight.slug)}</div>
        <div class="highlight-actions">
          <button class="btn btn-link edit-highlight" data-highlight-id="${highlight.id}" title="Edit">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-link delete-highlight" data-highlight-id="${highlight.id}" title="Delete">
            <i class="bi bi-trash3"></i>
          </button>
        </div>
      `;
      list.appendChild(item);
    }

    function selectHighlight(highlightId) {
      // Update visual state of all items
      document.querySelectorAll('.highlight-item').forEach(el => {
        el.classList.remove('active');
        el.classList.add('unselected');
      });

      if (highlightId !== null) {
        const item = document.querySelector(`.highlight-item[data-highlight-id="${highlightId}"]`);
        if (item) {
          item.classList.add('active');
          item.classList.remove('unselected');
          item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }

      selectedHighlightId = highlightId;
      sendHighlightsToViewer();
    }

    // Sidebar click handlers
    document.getElementById('highlights-list').addEventListener('click', function(e) {
      const item = e.target.closest('.highlight-item');
      if (item && !e.target.closest('.delete-highlight') && !e.target.closest('.edit-highlight')) {
        const highlightId = parseInt(item.dataset.highlightId);
        const page = parseInt(item.dataset.page);

        // Toggle selection
        if (selectedHighlightId === highlightId) {
          // Deselect if clicking the selected highlight
          selectHighlight(null);
        } else {
          // Select this highlight
          selectHighlight(highlightId);
          // Scroll to it in the PDF
          iframe.contentWindow.postMessage({
            type: 'scrollToHighlight',
            highlightId: highlightId,
            page: page
          }, '*');
        }
      }

      // Edit button
      const editBtn = e.target.closest('.edit-highlight');
      if (editBtn) {
        const highlightId = parseInt(editBtn.dataset.highlightId);
        openEditModal(highlightId);
      }

      // Delete button
      const deleteBtn = e.target.closest('.delete-highlight');
      if (deleteBtn) {
        const highlightId = parseInt(deleteBtn.dataset.highlightId);
        deleteHighlight(highlightId);
      }
    });

    async function deleteHighlight(highlightId) {
      if (!confirm('Are you sure you want to delete this highlight?')) return;

      try {
        const response = await fetch(`/documents/highlights/${highlightId}/delete/`, {
          method: 'POST',
          headers: {
            'X-CSRFToken': config.csrfToken
          }
        });

        if (response.ok) {
          // Clear selection if the deleted highlight was selected
          if (selectedHighlightId === highlightId) {
            selectedHighlightId = null;
          }

          // Remove from array
          config.existingHighlights = config.existingHighlights.filter(h => h.id !== highlightId);

          // Remove from sidebar
          const item = document.querySelector(`.highlight-item[data-highlight-id="${highlightId}"]`);
          if (item) item.remove();

          // Show "no highlights" if empty
          if (config.existingHighlights.length === 0) {
            document.getElementById('highlights-list').innerHTML =
              '<div class="no-highlights">No highlights yet. Select text in the PDF and click "+ Highlight" to create one.</div>';
          }

          // Update viewer
          sendHighlightsToViewer();
        } else {
          const error = await response.json();
          alert('Error deleting highlight: ' + (error.error || 'Unknown error'));
        }
      } catch (error) {
        console.error('Error deleting highlight:', error);
        alert('Error deleting highlight');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Edit highlight modal
    let editingHighlightId = null;

    async function openEditModal(highlightId) {
      editingHighlightId = highlightId;
      try {
        const response = await fetch(`/documents/highlights/${highlightId}/edit/?context=viewer`, {
          headers: {
            'X-Requested-With': 'XMLHttpRequest'
          }
        });
        if (response.ok) {
          const html = await response.text();
          document.getElementById('edit-highlight-modal-content').innerHTML = html;
          const modal = new bootstrap.Modal(document.getElementById('edit-highlight-modal'));
          modal.show();

          // Attach form submit handler
          const form = document.querySelector('#edit-highlight-modal form');
          if (form) {
            form.addEventListener('submit', handleEditFormSubmit);
          }

          // Attach delete handler
          const deleteLink = document.querySelector('#edit-highlight-modal .delete-link');
          if (deleteLink) {
            deleteLink.addEventListener('click', function(e) {
              e.preventDefault();
              if (confirm('Are you sure you want to delete this highlight?')) {
                bootstrap.Modal.getInstance(document.getElementById('edit-highlight-modal')).hide();
                deleteHighlight(editingHighlightId);
              }
            });
          }
        }
      } catch (error) {
        console.error('Error loading edit form:', error);
        alert('Error loading edit form');
      }
    }

    async function handleEditFormSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);
      // Get URL from hx-post attribute (since form uses HTMX attributes)
      const postUrl = form.getAttribute('hx-post') || form.action;

      try {
        const response = await fetch(postUrl + '?context=viewer', {
          method: 'POST',
          body: formData,
          headers: {
            'X-CSRFToken': config.csrfToken
          }
        });

        if (response.ok) {
          const data = await response.json();

          // Update sidebar card
          updateSidebarCard(editingHighlightId, data);

          // Update config array
          const idx = config.existingHighlights.findIndex(h => h.id === editingHighlightId);
          if (idx !== -1) {
            config.existingHighlights[idx] = { ...config.existingHighlights[idx], ...data };
          }

          // Close modal
          bootstrap.Modal.getInstance(document.getElementById('edit-highlight-modal')).hide();

          // Update viewer if this highlight is selected
          if (selectedHighlightId === editingHighlightId) {
            sendHighlightsToViewer();
          }
        } else {
          const error = await response.json();
          alert('Error saving highlight: ' + (error.error || 'Unknown error'));
        }
      } catch (error) {
        console.error('Error saving highlight:', error);
        alert('Error saving highlight');
      }
    }

    function updateSidebarCard(highlightId, data) {
      const item = document.querySelector(`.highlight-item[data-highlight-id="${highlightId}"]`);
      if (!item) return;

      // Update color class
      item.className = item.className.replace(/hl-\w+/, `hl-${data.color}`);
      item.dataset.color = data.color;

      // Update slug
      const slugEl = item.querySelector('.highlight-slug');
      if (slugEl) {
        slugEl.textContent = data.slug;
      }

      // Update importance badge
      const impEl = item.querySelector('.highlight-importance');
      if (impEl) {
        impEl.innerHTML = `<i class="bi bi-flag"></i>${data.importance}`;
        impEl.className = 'highlight-importance';
        if (data.importance === 1) {
          impEl.classList.add('imp-high');
        } else if (data.importance <= 3) {
          impEl.classList.add('imp-med');
        }
      }
    }
    </script>
  </body>
</html>
