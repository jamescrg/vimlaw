<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">
        {% if not edit %}
          Add Folder
        {% else %}
          Edit Folder
        {% endif %}
      </h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form hx-post="{{ action }}"
            class="form-compact"
            hx-target="#folders"
            hx-swap="innerHTML"
            role="form">
        {% csrf_token %}
        <div class="mb-3">
          {{ form.name.label_tag }}
          {{ form.name }}
          {% if form.name.errors %}<div class="text-danger">{{ form.name.errors }}</div>{% endif %}
        </div>
        <div class="flex-center-space">
          <div>
            <button type="submit" class="submit">Submit</button>
          </div>
          <div>
            {% if edit %}
              <a href="#"
                 class="delete-link"
                 hx-confirm="Are you sure you want to delete this folder?"
                 hx-delete="{% url 'folders:delete' folder.id %}"
                 hx-target="#folders"
                 hx-swap="innerHTML">Delete Folder</a>
            {% endif %}
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
