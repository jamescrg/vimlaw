<div class="add-folder">
  <i class="bi bi-folder"></i>
  <input autofocus
         class="edit-folder-input"
         type="text"
         name="name"
         onfocus="moveFocusToEnd(this)"
         hx-post="/folders/update/{{ folder.id }}"
         hx-target="#folder-{{ folder.id }}"
         hx-trigger="change, blur"
         hx-trigger="change, blur, keyup[key=='Enter']"
         hx-swap="outerHTML"
         value="{{ folder.name }}" />
</div>
