<div class="section">
  <div class="folders">
    <div class="toolbar">
      <div class="toolbar-left">
        <h1>Folders</h1>
      </div>
      <div class="toolbar-right">
        <button id="add-folder-button"
                class="button-link"
                onclick="showAddFolderForm()">
          <i class="bi bi-plus-lg"></i>
        </button>
      </div>
    </div>
    {% include "folders/add.html" %}
    <ul class="list-group">
      {% if folders %}
        {% for folder in folders %}
          <div class="folder-item-container list-group-item">
            <li class="folder-item">
              <i class="bi bi-folder"></i>
              <div class="show-folder">
                <a href="#" hx-post="{% url 'folders:list' id=folder.id app=app %}"
                  {# agenda #}
                  {% if selected_folders and folder in selected_folders %}class="strong"{% endif %}
                  {# contacts #}
                  {% if selected_folder and selected_folder.id == folder.id %}class="strong"{% endif %}
                  {% if selected_folder.id == None and folder.id == 0 %}class="strong"{% endif %}
                >{{ folder.name }}</a>
              </div>
              {% include "folders/edit.html" %}
            </li>
            {% if folder.id %}
              <button class="btn-icon menu-icon"
                      type="button"
                      data-bs-toggle="dropdown"
                      aria-expanded="false">
                <i class="bi bi-three-dots-vertical"></i>
              </button>
              <ul class="dropdown-menu" aria-labelledby="folderDropdown">
                <li>
                  <button class="dropdown-item" onclick="showEditFolderForm()">Edit</button>
                </li>
                <li>
                  <a class="dropdown-item"
                     href="#"
                     hx-confirm='Are you sure you want to delete this folder?'
                     hx-delete="{% url 'folders:delete' id=folder.id app=app %}">Delete</a>
                </li>
              </ul>
            {% endif %}
          </div>
        {% endfor %}
      {% endif %}
    </ul>
  </div>
</div>
