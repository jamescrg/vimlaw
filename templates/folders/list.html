<div class="card">
  <div class="folders">
    <div class="toolbar">
      <div class="toolbar-left">
        <h1>Clients</h1>
      </div>
    </div>
    <ul class="list-group">
      <li class="folder-item-container list-group-item{% if client_status == 'Pending' %} item-selected-highlight{% endif %}">
        <div>
          <i class="icon-user"></i>
          <a href="{% url 'folders:client' 'Pending' %}">Pending</a>
        </div>
      </li>
      <li class="folder-item-container list-group-item{% if client_status == 'Current' %} item-selected-highlight{% endif %}">
        <div>
          <i class="icon-user"></i>
          <a href="{% url 'folders:client' 'Current' %}">Current</a>
        </div>
      </li>
      <li class="folder-item-container list-group-item{% if client_status == 'Former' %} item-selected-highlight{% endif %}">
        <div>
          <i class="icon-user"></i>
          <a href="{% url 'folders:client' 'Former' %}">Former</a>
        </div>
      </li>
    </ul>
  </div>
</div>
<div class="card">
  <div class="folders">
    <div class="toolbar">
      <div class="toolbar-left">
        <h1>Folders</h1>
      </div>
      <div class="toolbar-right">
        <button class="button-link"
                hx-get="{% url 'folders:add' %}"
                hx-target="#htmx-modal-container"
                data-bs-toggle="modal"
                data-bs-target="#htmx-modal-container">
          <i class="icon-plus"></i>
        </button>
      </div>
    </div>
    <ul class="list-group">
      {% for folder in folders %}
        {% include "folders/folder.html" %}
      {% empty %}
        <li class="list-group-item empty-message">No folders found.</li>
      {% endfor %}
      <li class="folder-item-container list-group-item{% if not client_status and not selected_folder %} item-selected-highlight{% endif %}">
        <div>
          <i class="icon-folder"></i>
          <a href="{% url 'folders:unsorted' %}">Unsorted</a>
        </div>
      </li>
    </ul>
  </div>
</div>
