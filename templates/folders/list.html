<div class="section">
  <div class="folders">
    <div class="toolbar">
      <div class="toolbar-left">
        <h1>Folders</h1>
      </div>
      <div class="toolbar-right">
        <button id="add-folder-button"
                class="button-link"
                onclick="showAddFolderForm()">
          <i class="bi bi-plus-lg"></i>
        </button>
      </div>
    </div>
    {% include "folders/add.html" %}
    <ul class="list-group">
      {% if folders %}
        {% for folder in folders %}
          <div id="folder-{{ folder.id }}">{% include "folders/single-folder.html" %}</div>
        {% endfor %}
      {% endif %}
    </ul>
  </div>
</div>
