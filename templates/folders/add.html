<li class="folder-item-container list-group-item add-folder">
  <div class="show-folder">
    <i class="bi bi-folder"></i>
    <input autofocus
           class="edit-folder-input"
           type="text"
           name="name"
           hx-post="{% url 'folders:insert' %}"
           hx-target="#folders"
           hx-trigger="change, blur, keyup[key=='Enter']"
           hx-swap="innerHTML" />
  </div>
</li>
