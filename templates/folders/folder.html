{% load is_number %}
<li id="folder-{{ folder.id }}"
    class="folder-item-container list-group-item{% if selected_folder and selected_folder.id == folder.id %} item-selected-highlight{% endif %}">
  <div>
    <i class="bi bi-folder"></i>
    <a href="{% url 'folders:select' folder_id=folder.id %}">{{ folder.name }}</a>
  </div>
  <button class="btn-icon menu-icon"
          type="button"
          data-bs-toggle="dropdown"
          aria-expanded="false">
    <i class="bi bi-three-dots-vertical"></i>
  </button>
  <ul class="dropdown-menu" aria-labelledby="folderDropdown">
    <li>
      <a class="dropdown-item"
         href="#"
         hx-get="{% url 'folders:edit' folder_id=folder.id %}"
         hx-target="#htmx-modal-container"
         data-bs-toggle="modal"
         data-bs-target="#htmx-modal-container">Edit</a>
    </li>
    <li>
      <a class="dropdown-item"
         href="#"
         hx-confirm='Are you sure you want to delete this folder?'
         hx-target="#folders"
         hx-delete="{% url 'folders:delete' folder_id=folder.id %}">Delete</a>
    </li>
  </ul>
</li>
