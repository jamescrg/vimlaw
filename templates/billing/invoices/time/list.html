{% block subcontent %}
  <div class="section-title">
    <div class="section-title-left">
      <h1>Time Entries</h1>
    </div>
  </div>
  <div class="table-container">
    <table class="table activity">
      <tr>
        <th class="date">
          Date
          <a href={% url 'activity:time-order-by' 'date' %}>
            <i class="bi bi-chevron-expand"></i>
          </a>
        </th>
        <th class="user">User</th>
        <th class="matter">
          Matter
          <a href={% url 'activity:time-order-by' 'matter' %}>
            <i class="bi bi-chevron-expand"></i>
          </a>
        </th>
        <th class="actions">
          Actions
          <a href={% url 'activity:time-order-by' 'actions' %}>
            <i class="bi bi-chevron-expand"></i>
          </a>
        </th>
        <th class="numeric hours">Hours</th>
        <th class="numeric rate">Rate</th>
        <th class="numeric fee">Fee</th>
      </tr>
      <tr id="time-table"></tr>
      {% for entry in objects %}
        <tr id="time-{{ entry.id }}">{% include "activity/time/table-row.html" %}</tr>
      {% endfor %}
    </table>
  </div>
  <div class="flex-start-space">
    <div>{% include "pagination.html" %}</div>
    {% include "activity/time/summary.html" %}
  </div>
{% endblock subcontent %}
