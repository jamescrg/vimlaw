<div class="modal-dialog modal-lg">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Edit Invoice</h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <h2>{{ invoice.matter }}</h2>
      <br />
      <form class="form-responsive invoices-add"
            method="post"
            action="{% url 'billing:invoices-edit' invoice.id %}">
        {% csrf_token %}
        {{ form }}
        <br />
        <div class="flex-center-space">
          <button type="submit" class="submit">Submit</button>
          <div>
            <a onclick="return confirm('Are you sure you want to delete this invoice?')"
               href="{% url 'billing:invoices-delete' invoice.id %}">Delete Invoice</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
