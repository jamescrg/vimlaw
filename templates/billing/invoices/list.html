{% block subcontent %}
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="filter-tools">
        <button type="button"
                class="btn-icon"
                hx-get="{% url 'billing:invoices-add' %}"
                hx-target="#htmx-modal-container"
                hx-trigger="click"
                data-bs-toggle="modal"
                data-bs-target="#htmx-modal-container">
          <i class="bi bi-plus-lg"></i>
        </button>
        <button type="button"
                class="btn-icon"
                hx-get="{% url 'billing:invoices-filter' %}"
                hx-target="#htmx-modal-container"
                hx-trigger="click"
                data-bs-toggle="modal"
                data-bs-target="#htmx-modal-container">Filter</button>
        <a type="button"
           class="btn-icon {% if selected_status == "DRAFT" %}toggle-active{% endif %}"
           href="#"
           hx-post="{% url 'billing:invoices-filter-status' "DRAFT" %}">Draft</a>
        <a type="button"
           href="#"
           class="btn-icon {% if selected_status == "APPROVED" %}toggle-active{% endif %}"
           hx-post="{% url 'billing:invoices-filter-status' "APPROVED" %}">Approved</a>
        <a type="button"
           href="#"
           class="btn-icon {% if selected_status == "SENT" %}toggle-active{% endif %}"
           hx-post="{% url 'billing:invoices-filter-status' "SENT" %}">Sent</a>
        <a type="button"
           href="#"
           class="btn-icon {% if selected_status == "PAID" %}toggle-active{% endif %}"
           hx-post="{% url 'billing:invoices-filter-status' "PAID" %}">Paid</a>
      </div>
    </div>
  </div>
  <div class="table-container">
    <table class="table invoices">
      <tr>
        <th class="invoice-id">ID</th>
        <th class="date">
          Issue Date
          <a href="#" hx-get="{% url 'billing:invoices-order-by' 'date_issued' %}">
            <i class="bi bi-chevron-expand"></i>
          </a>
        </th>
        <th>
          Matter
          <a href="#" hx-get="{% url 'billing:invoices-order-by' 'matter' %}">
            <i class="bi bi-chevron-expand"></i>
          </a>
        </th>
        <th class="status">
          Status
          <a href="#" hx-get="{% url 'billing:invoices-order-by' 'status' %}">
            <i class="bi bi-chevron-expand"></i>
          </a>
        </th>
        <th class="amount">Fees</th>
        <th class="amount">Expenses</th>
        <th class="amount">Total</th>
        <th class="download">
          <i class="bi bi-download"></i>
        </th>
      </tr>
      {% for invoice in objects %}
        {% include "billing/invoices/row.html" %}
      {% endfor %}
    </table>
    <div class="flex-start-space">
      <div>{% include "pagination.html" %}</div>
      {% include "billing/invoices/summary.html" %}
    </div>
  </div>
{% endblock subcontent %}
