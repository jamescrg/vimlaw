{% block subcontent %}
  {% load humanize %}
  <div id="payment-list">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="filter-tools">
          <button type="button"
                  class="btn-icon"
                  hx-get="{% url 'billing:payments-add' %}"
                  hx-target="#htmx-modal-container"
                  hx-trigger="click"
                  data-bs-toggle="modal"
                  data-bs-target="#htmx-modal-container">
            <i class="bi bi-plus-lg"></i>
          </button>
          <button type="button"
                  class="btn-icon"
                  hx-get="{% url 'billing:payments-filter' %}"
                  hx-target="#htmx-modal-container"
                  hx-trigger="click"
                  data-bs-toggle="modal"
                  data-bs-target="#htmx-modal-container">Filter</button>
        </div>
      </div>
    </div>
    <div class="table-container">
      <table class="table payments">
        <tr>
          <th class="id">ID</th>
          <th class="date">
            Date
            <a href="#" hx-post="{% url 'billing:payments-order-by' 'date' %}">
              <i class="bi bi-chevron-expand"></i>
            </a>
          </th>
          <th>
            Matter
            <a href="#" hx-post="{% url 'billing:payments-order-by' 'matter' %}">
              <i class="bi bi-chevron-expand"></i>
            </a>
          </th>
          <th>
            Method
            <a href="#"
               hx-post="{% url 'billing:payments-order-by' 'payment_method' %}">
              <i class="bi bi-chevron-expand"></i>
            </a>
          </th>
          <th>
            Detail
            <a href="#" hx-post="{% url 'billing:payments-order-by' 'detail' %}">
              <i class="bi bi-chevron-expand"></i>
            </a>
          </th>
          <th class="amount">Amount</th>
        </tr>
        {% for payment in objects %}
          {% include "billing/payments/row.html" %}
        {% endfor %}
      </table>
      <div class="flex-start-space">
        <div>{% include "pagination.html" %}</div>
        <div class="totals-table">
          <table>
            <tr>
              <th>Total Payments</th>
              <td class="numeric strong">${{ payments_total|floatformat:2|intcomma }}</td>
            </tr>
          </table>
        </div>
      </div>
    </div>
  </div>
{% endblock subcontent %}
