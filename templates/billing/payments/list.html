{% extends "billing/list.html" %}
{% block subcontent %}
  <div id="payment-list">
    <div class="section-title">
      <div class="section-title-left">
        <h1>Payments</h1>
        <div class="section-title-left-right">
          <button type="button"
                  class="btn-icon"
                  hx-get="{% url 'billing:payments-add' %}"
                  hx-target="#htmx-modal-container"
                  hx-trigger="click"
                  data-bs-toggle="modal"
                  data-bs-target="#htmx-modal-container">
            <i class="bi bi-plus-lg"></i>
          </button>
          <button type="button"
                  class="btn-icon"
                  hx-get="{% url 'billing:payments-filter' %}"
                  hx-target="#htmx-modal-container"
                  hx-trigger="click"
                  data-bs-toggle="modal"
                  data-bs-target="#htmx-modal-container">Filter</button>
        </div>
      </div>
    </div>
    <div class="table-container">
      <table class="table">
        <tr>
          <th class="number">Number</th>
          <th>Matter</th>
          <th class="date">Date</th>
          <th>Payment method</th>
          <th>Payment detail</th>
          <th class="amount">Amount</th>
          <th class="payments-actions">
            <i class="bi bi-three-dots-vertical"></i>
          </th>
        </tr>
        {% for payment in objects %}
          {% include "billing/payments/row.html" %}
        {% endfor %}
      </table>
      {% include "pagination.html" %}
    </div>
  </div>
{% endblock subcontent %}
