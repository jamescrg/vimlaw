{% load humanize %}
<tr id="payment-{{ payment.id }}">
  <td class="id">
    <button class="button-link"
            type="button"
            data-bs-toggle="dropdown"
            aria-expanded="false">{{ payment.id }}</button>
    <ul class="dropdown-menu" aria-labelledby="paymentDropdown">
      <li>
        <a class="dropdown-item"
           href="#"
           hx-get="{% url 'billing:payments-edit' payment.id %}"
           hx-target="#htmx-modal-container"
           hx-trigger="click"
           data-bs-toggle="modal"
           data-bs-target="#htmx-modal-container">Edit</a>
      </li>
      <li>
        <a onclick="return confirm('Are you sure you want to delete this payment?')"
           href="{% url 'billing:payments-delete' payment.id %}">Delete</a>
      </li>
    </ul>
  </td>
  <td class="date">{{ payment.date|date:"Y-m-d" }}</td>
  <td class="matter">
    <a href={% url 'matters:detail' id=payment.matter.id %}>{{ payment.matter.name|slice:":20" }}</a>
  </td>
  <td class="method">{{ payment.method_display }}</td>
  <td>{{ payment.detail|default:"" }}</td>
  <td class="amount">${{ payment.amount|floatformat:2|intcomma }}</td>
</tr>
