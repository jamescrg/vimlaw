<!DOCTYPE html>
<html dir="ltr" lang="en" mozdisallowselectionprint>
  <head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="description" content="PDF document viewer">
    <meta name="keywords" content="pdf, viewer, document">
    <title>PDF Viewer</title>
    <link rel="stylesheet" href="pdf_viewer.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
      html,
      body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      #viewerContainer {
        position: absolute;
        overflow: auto;
        width: 100%;
        top: 44px;
        bottom: 0;
        left: 0;
        right: 0;
        background: #f5f5f4;
      }

      #viewer {
        margin: 0 auto;
      }

      #toolbar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 44px;
        background: #e7e5e4;
        border-bottom: 1px solid #d6d3d1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2px 10px;
        gap: 10px;
        z-index: 100;
      }

      #toolbar button {
        background: #fafaf9;
        border: 1px solid #a8a29e;
        color: #44403c;
        padding: 6px 12px;
        cursor: pointer;
        border-radius: 0.375rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      #toolbar button i {
        -webkit-text-stroke: 0.5px currentColor;
      }

      #toolbar button:hover {
        background: #f5f5f4;
      }

      #toolbar #createHighlightBtn {
        background: #fefce8;
      }

      #toolbar #createHighlightBtn:hover {
        background: #fef9c3;
      }

      #toolbar #createHighlightBtn {
        position: absolute;
        right: 60px;
        letter-spacing: 0.5px;
        gap: 0.25rem;
        padding: 6px 12px 6px 8px;
      }

      #toolbar #downloadBtn {
        position: absolute;
        right: 10px;
      }

      #pageNumber {
        width: 50px;
        text-align: center;
        background: #fafaf9;
        border: 1px solid #a8a29e;
        color: #57534e;
        padding: 6px;
        border-radius: 0.375rem;
      }

      #toolbar span {
        color: #57534e;
      }

      #zoomSelect {
        background: #fafaf9;
        border: 1px solid #a8a29e;
        color: #57534e;
        padding: 6px;
        border-radius: 0.375rem;
        letter-spacing: 0.5px;
      }

      .toolbarSeparator {
        width: 1px;
        height: 20px;
        background: #666;
        margin: 0 5px;
      }

      /* Search bar styles */
      .searchBar {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      #searchInput {
        width: 150px;
        padding: 6px 8px;
        border: 1px solid #a8a29e;
        border-radius: 0.375rem;
        background: #fafaf9;
        color: #57534e;
        font-size: 14px;
      }

      #searchInput:focus {
        outline: none;
        border-color: #57534e;
      }

      #searchInput::placeholder {
        color: #a8a29e;
      }

      .searchBar button {
        padding: 6px 8px;
        min-width: 32px;
        margin-left: 0.25rem;
      }

      #searchResults {
        font-size: 12px;
        color: #57534e;
        min-width: 60px;
        text-align: center;
      }

      #searchResults.no-results {
        color: #dc2626;
      }

      /* Highlight overlay styles */
      .highlight-container {
        position: absolute;
        pointer-events: none;
        mix-blend-mode: multiply;
      }

      .highlight-container:hover {
        filter: brightness(0.85);
      }

      .highlight-overlay {
        position: absolute;
        pointer-events: auto;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="previous" title="Previous Page">
        <i class="bi bi-chevron-left"></i>
      </button>
      <input type="number" id="pageNumber" value="1" min="1">
      <span>/ <span id="numPages">-</span></span>
      <button id="next" title="Next Page">
        <i class="bi bi-chevron-right"></i>
      </button>
      <div class="toolbarSeparator"></div>
      <button id="zoomOut" title="Zoom Out">
        <i class="bi bi-zoom-out"></i>
      </button>
      <select id="zoomSelect">
        <option value="page-width" selected>Fit Width</option>
        <option value="0.5">50%</option>
        <option value="0.75">75%</option>
        <option value="1">100%</option>
        <option value="1.25">125%</option>
        <option value="1.5">150%</option>
        <option value="2">200%</option>
      </select>
      <button id="zoomIn" title="Zoom In">
        <i class="bi bi-zoom-in"></i>
      </button>
      <div class="toolbarSeparator"></div>
      <div class="searchBar">
        <input type="text"
               id="searchInput"
               placeholder="Search..."
               title="Search in document">
        <button id="searchPrev" title="Previous match (Shift+Enter)">
          <i class="bi bi-chevron-up"></i>
        </button>
        <button id="searchNext" title="Next match (Enter)">
          <i class="bi bi-chevron-down"></i>
        </button>
        <span id="searchResults"></span>
      </div>
      <button id="createHighlightBtn" title="Create highlight from selected text">
        <i class="bi bi-plus"></i> Highlight
      </button>
      <button id="downloadBtn" title="Download document">
        <i class="bi bi-download"></i>
      </button>
    </div>
    <div id="viewerContainer">
      <div id="viewer" class="pdfViewer"></div>
    </div>
    <script type="module">
    console.log('Viewer script starting...');

    let pdfjsLib, pdfjsViewer;
    try {
      pdfjsLib = await import('../build/pdf.js');
      console.log('PDF.js loaded');
    } catch (e) {
      console.error('Failed to load pdf.js:', e);
      document.getElementById('viewer').innerHTML = '<p style="padding: 20px; color: red;">Failed to load PDF.js library: ' + e.message + '</p>';
      throw e;
    }

    try {
      pdfjsViewer = await import('./pdf_viewer.js');
      console.log('PDF Viewer loaded');
    } catch (e) {
      console.error('Failed to load pdf_viewer.js:', e);
      document.getElementById('viewer').innerHTML = '<p style="padding: 20px; color: red;">Failed to load PDF Viewer: ' + e.message + '</p>';
      throw e;
    }

    // Set worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = '../build/pdf.worker.js';

    // Get URL parameters
    const params = new URLSearchParams(window.location.search);
    const pdfUrl = params.get('file');
    const initialPage = parseInt(params.get('page')) || 1;

    console.log('PDF URL:', pdfUrl);

    if (!pdfUrl) {
      document.getElementById('viewer').innerHTML = '<p style="padding: 20px; color: red;">No PDF file specified</p>';
      throw new Error('No PDF file specified');
    }

    // Initialize viewer
    const container = document.getElementById('viewerContainer');
    const eventBus = new pdfjsViewer.EventBus();

    const pdfLinkService = new pdfjsViewer.PDFLinkService({
      eventBus,
    });

    // Initialize find controller for search
    const pdfFindController = new pdfjsViewer.PDFFindController({
      linkService: pdfLinkService,
      eventBus,
    });

    const pdfViewer = new pdfjsViewer.PDFViewer({
      container,
      eventBus,
      linkService: pdfLinkService,
      findController: pdfFindController,
      textLayerMode: 2, // Enable text layer
    });

    pdfLinkService.setViewer(pdfViewer);

    // Expose viewer for parent window
    window.pdfViewer = pdfViewer;
    window.eventBus = eventBus;

    // Current selection data
    let currentSelection = null;

    // Load PDF
    const loadingTask = pdfjsLib.getDocument(pdfUrl);
    loadingTask.promise.then(pdf => {
      document.getElementById('numPages').textContent = pdf.numPages;
      document.getElementById('pageNumber').max = pdf.numPages;

      pdfViewer.setDocument(pdf);
      pdfLinkService.setDocument(pdf);
    }).catch(err => {
      console.error('Error loading PDF:', err);
      document.getElementById('viewer').innerHTML = '<p style="padding: 20px; color: red;">Error loading PDF: ' + err.message + '</p>';
    });

    // Set zoom and navigate after pages are loaded
    eventBus.on('pagesloaded', () => {
      // Set default zoom to fit width
      pdfViewer.currentScaleValue = 'page-width';

      // Navigate to initial page
      if (initialPage > 1) {
        pdfViewer.currentPageNumber = initialPage;
      }

      // Notify parent that viewer is ready
      window.parent.postMessage({ type: 'viewerReady', numPages: pdfViewer.pagesCount }, '*');
    });

    // Page change events
    eventBus.on('pagechanging', evt => {
      document.getElementById('pageNumber').value = evt.pageNumber;
      window.parent.postMessage({ type: 'pageChanged', page: evt.pageNumber }, '*');
    });

    // Toolbar controls
    document.getElementById('previous').addEventListener('click', () => {
      if (pdfViewer.currentPageNumber > 1) {
        pdfViewer.currentPageNumber--;
      }
    });

    document.getElementById('next').addEventListener('click', () => {
      if (pdfViewer.currentPageNumber < pdfViewer.pagesCount) {
        pdfViewer.currentPageNumber++;
      }
    });

    document.getElementById('pageNumber').addEventListener('change', evt => {
      const page = parseInt(evt.target.value);
      if (page >= 1 && page <= pdfViewer.pagesCount) {
        pdfViewer.currentPageNumber = page;
      }
    });

    document.getElementById('zoomOut').addEventListener('click', () => {
      const current = pdfViewer.currentScale;
      pdfViewer.currentScale = Math.max(0.25, current - 0.25);
      updateZoomSelect();
    });

    document.getElementById('zoomIn').addEventListener('click', () => {
      const current = pdfViewer.currentScale;
      pdfViewer.currentScale = Math.min(4, current + 0.25);
      updateZoomSelect();
    });

    document.getElementById('zoomSelect').addEventListener('change', evt => {
      const value = evt.target.value;
      if (value === 'page-width') {
        pdfViewer.currentScaleValue = 'page-width';
      } else {
        pdfViewer.currentScale = parseFloat(value);
      }
    });

    function updateZoomSelect() {
      const scale = pdfViewer.currentScale;
      const select = document.getElementById('zoomSelect');
      const options = select.options;
      for (let i = 0; i < options.length; i++) {
        if (Math.abs(parseFloat(options[i].value) - scale) < 0.01) {
          select.selectedIndex = i;
          return;
        }
      }
    }

    // Search functionality
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const searchPrev = document.getElementById('searchPrev');
    const searchNext = document.getElementById('searchNext');
    let searchTimeout = null;

    function doSearch(query, findPrevious = false, type = '') {
      if (!query) {
        // Clear search
        eventBus.dispatch('findbarclose', { source: window });
        searchResults.textContent = '';
        searchResults.classList.remove('no-results');
        return;
      }

      eventBus.dispatch('find', {
        source: window,
        type: type,
        query: query,
        caseSensitive: false,
        highlightAll: true,
        findPrevious: findPrevious,
      });
    }

    // Debounced search on input
    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        doSearch(e.target.value);
      }, 300);
    });

    // Keyboard shortcuts in search input
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        clearTimeout(searchTimeout);
        if (e.shiftKey) {
          doSearch(searchInput.value, true, 'again');
        } else {
          doSearch(searchInput.value, false, 'again');
        }
      } else if (e.key === 'Escape') {
        searchInput.value = '';
        doSearch('');
        searchInput.blur();
      }
    });

    // Prev/Next buttons
    searchPrev.addEventListener('click', () => {
      doSearch(searchInput.value, true, 'again');
    });

    searchNext.addEventListener('click', () => {
      doSearch(searchInput.value, false, 'again');
    });

    // Ctrl+F to focus search
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
      }
    });

    // Listen for search results updates
    eventBus.on('updatefindmatchescount', (evt) => {
      const { current, total } = evt.matchesCount;
      if (total > 0) {
        searchResults.textContent = `${current} of ${total}`;
        searchResults.classList.remove('no-results');
      } else if (searchInput.value) {
        searchResults.textContent = 'No results';
        searchResults.classList.add('no-results');
      } else {
        searchResults.textContent = '';
        searchResults.classList.remove('no-results');
      }
    });

    eventBus.on('updatefindcontrolstate', (evt) => {
      const { state, matchesCount } = evt;
      // state: 0=FOUND, 1=NOT_FOUND, 2=WRAPPED, 3=PENDING
      if (state === 1 && searchInput.value) {
        searchResults.textContent = 'No results';
        searchResults.classList.add('no-results');
      }
    });

    // Merge overlapping/adjacent rectangles into single line rectangles
    function mergeRects(rects) {
      if (rects.length === 0) return [];

      // Group rects by approximate vertical position (same line)
      const lineGroups = [];
      const tolerance = 2; // pixels

      rects.forEach(rect => {
        // Find existing line group with similar top position
        const group = lineGroups.find(g =>
          Math.abs(g[0].top - rect.top) < tolerance
        );
        if (group) {
          group.push(rect);
        } else {
          lineGroups.push([rect]);
        }
      });

      // Merge each line group into a single rect
      return lineGroups.map(group => {
        const left = Math.min(...group.map(r => r.left));
        const top = Math.min(...group.map(r => r.top));
        const right = Math.max(...group.map(r => r.left + r.width));
        const bottom = Math.max(...group.map(r => r.top + r.height));
        return {
          left,
          top,
          width: right - left,
          height: bottom - top
        };
      });
    }

    // Enable copy to clipboard (capture phase to intercept before PDF.js)
    document.addEventListener('copy', (event) => {
      const selection = window.getSelection();
      const text = selection.toString();
      if (text) {
        event.clipboardData.setData('text/plain', text.replace(/\s+/g, ' ').trim());
        event.preventDefault();
        event.stopImmediatePropagation();
      }
    }, true);

    // Text selection handling
    document.addEventListener('mouseup', () => {
      const selection = window.getSelection();
      // Get raw text and normalize whitespace (PDF.js can add odd spacing)
      const rawText = selection.toString();
      let text = rawText.replace(/\s+/g, ' ').trim();

      if (text) {
        // Find all pages involved in the selection
        const range = selection.getRangeAt(0);
        const startPage = range.startContainer?.parentElement?.closest('.page');
        const endPage = range.endContainer?.parentElement?.closest('.page');

        if (!startPage) {
          currentSelection = null;
          return;
        }

        // Use the start page for the highlight
        const pageDiv = startPage;
        const textLayer = pageDiv?.querySelector('.textLayer');
        if (!textLayer) {
          currentSelection = null;
          return;
        }

        // Snap to word boundaries - expand selection if it starts/ends mid-word
        // Check start of selection - if first char isn't a space and we're mid-word, expand left
        const startContainer = range.startContainer;
        if (startContainer.nodeType === Node.TEXT_NODE) {
          const textContent = startContainer.textContent;
          const startOffset = range.startOffset;
          // If we're not at the start and previous char is a letter, expand to word start
          if (startOffset > 0 && /\w/.test(textContent[startOffset - 1])) {
            // Find the start of the word
            let wordStart = startOffset - 1;
            while (wordStart > 0 && /\w/.test(textContent[wordStart - 1])) {
              wordStart--;
            }
            // Get the missing prefix
            const prefix = textContent.substring(wordStart, startOffset);
            text = prefix + text;
            // Also expand the range for accurate rectangles
            range.setStart(startContainer, wordStart);
          }
        }

        const pageNumber = parseInt(pageDiv.dataset.pageNumber);
        // Use textLayer as reference for coordinates
        const textLayerRect = textLayer.getBoundingClientRect();
        const scale = pdfViewer.currentScale;

        const selectionRects = [];

        // Use getClientRects() from the range for accurate selection bounds
        // Only include rects that are within the start page's text layer
        const rects = range.getClientRects();
        for (let i = 0; i < rects.length; i++) {
          const rect = rects[i];
          if (rect.width < 2 || rect.height < 5) continue;

          // Check if this rect is within the start page's text layer bounds
          // (allow some tolerance for rects that slightly overlap page boundary)
          const relTop = rect.top - textLayerRect.top;
          const relBottom = relTop + rect.height;
          if (relTop < textLayerRect.height + 50 && relBottom > -50) {
            selectionRects.push({
              left: (rect.left - textLayerRect.left) / scale,
              top: Math.max(0, relTop / scale),
              width: rect.width / scale,
              height: rect.height / scale,
            });
          }
        }

        // Merge overlapping rects into one rect per line
        const mergedRects = mergeRects(selectionRects);

        if (mergedRects.length > 0) {
          // Check if selection spans multiple pages
          const spansPages = startPage !== endPage;

          currentSelection = {
            text,
            page: pageNumber,
            rects: mergedRects,
            spansPages,
          };
          // Notify parent of selection change
          window.parent.postMessage({ type: 'selectionChanged', selection: currentSelection }, '*');
        }
      } else {
        currentSelection = null;
        window.parent.postMessage({ type: 'selectionCleared' }, '*');
      }
    });

    // Create highlight button
    document.getElementById('createHighlightBtn').addEventListener('click', () => {
      if (currentSelection) {
        window.parent.postMessage({ type: 'createHighlight', selection: currentSelection }, '*');
      }
    });

    // Download button
    document.getElementById('downloadBtn').addEventListener('click', () => {
      window.parent.postMessage({ type: 'download' }, '*');
    });

    // Listen for messages from parent
    window.addEventListener('message', evt => {
      const data = evt.data;

      switch (data.type) {
        case 'setHighlights':
          renderHighlights(data.highlights);
          break;

        case 'scrollToHighlight':
          scrollToHighlight(data.highlightId, data.page);
          break;

        case 'goToPage':
          pdfViewer.currentPageNumber = data.page;
          break;

        case 'setZoom':
          pdfViewer.currentScale = data.scale;
          updateZoomSelect();
          break;

        case 'clearSelection':
          window.getSelection().removeAllRanges();
          currentSelection = null;
          break;
      }
    });

    // Store highlights data for rendering
    let highlightsByPage = {};

    // Render highlights on pages
    function renderHighlights(highlights) {
      // Remove existing highlights
      document.querySelectorAll('.highlight-container').forEach(el => el.remove());

      // Group highlights by page
      highlightsByPage = {};
      highlights.forEach(h => {
        if (!highlightsByPage[h.page_number]) highlightsByPage[h.page_number] = [];
        highlightsByPage[h.page_number].push(h);
      });

      // Render on already-rendered pages
      Object.keys(highlightsByPage).forEach(pageNum => {
        const pageDiv = document.querySelector(`.page[data-page-number="${pageNum}"]`);
        if (pageDiv && pageDiv.querySelector('.textLayer')) {
          renderHighlightsOnPage(parseInt(pageNum), pageDiv);
        }
      });
    }

    // Single listener for page renders (set up once)
    eventBus.on('pagerendered', evt => {
      const pageHighlights = highlightsByPage[evt.pageNumber];
      if (pageHighlights) {
        // Small delay to ensure text layer is fully rendered
        setTimeout(() => {
          renderHighlightsOnPage(evt.pageNumber, evt.source.div);
        }, 50);
      }
    });

    function renderHighlightsOnPage(pageNum, pageDiv) {
      const pageHighlights = highlightsByPage[pageNum];
      if (!pageHighlights) return;

      const textLayer = pageDiv.querySelector('.textLayer');
      if (!textLayer) return;

      // Remove existing highlights on this page first
      textLayer.querySelectorAll('.highlight-container').forEach(el => el.remove());

      const scale = pdfViewer.currentScale;

      pageHighlights.forEach(highlight => {
        const coords = highlight.coordinates;
        if (!coords || !coords.rects) return;

        // Normalize rects to {left, top, width, height} format
        const normalizedRects = coords.rects.map(rect => ({
          left: rect.left !== undefined ? rect.left : rect.x1,
          top: rect.top !== undefined ? rect.top : rect.y1,
          width: rect.width !== undefined ? rect.width : (rect.x2 - rect.x1),
          height: rect.height !== undefined ? rect.height : (rect.y2 - rect.y1)
        }));

        // Merge overlapping rects (fixes existing highlights with overlapping data)
        const mergedRects = mergeRects(normalizedRects);

        // Create container for this highlight (blend mode applies to container)
        const container = document.createElement('div');
        container.className = 'highlight-container';
        container.dataset.highlightId = highlight.id;
        container.title = highlight.title || '';

        mergedRects.forEach((rect) => {
          const div = document.createElement('div');
          div.className = 'highlight-overlay';

          // Apply scale to normalized coordinates
          div.style.left = `${rect.left * scale}px`;
          div.style.top = `${rect.top * scale}px`;
          div.style.width = `${rect.width * scale}px`;
          div.style.height = `${rect.height * scale}px`;
          div.style.backgroundColor = highlight.color;

          container.appendChild(div);
        });

        // Add click handler to container
        container.addEventListener('click', () => {
          window.parent.postMessage({ type: 'highlightClicked', highlightId: highlight.id }, '*');
        });

        // Insert at beginning of textLayer so highlights are behind text
        textLayer.insertBefore(container, textLayer.firstChild);
      });
    }


    let pendingScrollHighlight = null;

    function scrollToHighlight(highlightId, page) {
      // Store the pending scroll target
      pendingScrollHighlight = highlightId;

      // Go to page first
      pdfViewer.currentPageNumber = page;

      // Try to scroll immediately if highlight already exists
      tryScrollToHighlight(highlightId);
    }

    function tryScrollToHighlight(highlightId) {
      const container = document.querySelector(`.highlight-container[data-highlight-id="${highlightId}"]`);
      if (container) {
        // Get the first overlay (first line of the highlight) to center on
        const firstOverlay = container.querySelector('.highlight-overlay');
        if (firstOverlay) {
          firstOverlay.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
          container.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        pendingScrollHighlight = null;
      }
    }

    // Hook into pagerendered to scroll after highlights are drawn
    eventBus.on('pagerendered', evt => {
      if (pendingScrollHighlight !== null) {
        // Wait for highlight rendering (50ms delay + buffer)
        setTimeout(() => {
          tryScrollToHighlight(pendingScrollHighlight);
        }, 100);
      }
    });
    </script>
  </body>
</html>
